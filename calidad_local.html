/* Floculante: cumple si dilucion entre 0,004 y 0,016 g */
function TurcoFloculanteForm({account,onBack,onSuccess}){
  var[fecha,setFecha]=useState(today());
  var[horario,setHorario]=useState(nowTime());
  var[solucion,setSolucion]=useState('');
  var[flocMadre,setFlocMadre]=useState('');
  var[flocDil,setFlocDil]=useState('');
  var[concMadre,setConcMadre]=useState('');
  var[concDil,setConcDil]=useState('');
  var[errors,setErrors]=useState({});
  var[sending,setSending]=useState(false);

  var dil=parseDecimal(flocDil);
  var estado=isNaN(dil)||flocDil===''?null:(dil>=0.004&&dil<=0.016)?'CUMPLE':'NO CUMPLE';

  function validate(){
    var e={};
    if(!fecha)e.fecha='Fecha requerida';
    if(!horario)e.horario='Horario requerido';
    if(!solucion)e.solucion='Solucion (mL) requerida';
    if(!flocMadre)e.flocMadre='Floculante madre requerido';
    if(!flocDil)e.flocDil='Floculante dilucion requerido';
    return e;
  }

  async function handleSend(){
    var e=validate();
    if(Object.keys(e).length){setErrors(e);window.scrollTo({top:0,behavior:'smooth'});return;}
    setErrors({});setSending(true);
    var now=new Date();
    var data={
      id:uid(),fecha:fecha,fechaEnvio:now.toISOString(),horaEnvio:now.toLocaleTimeString('es-CL'),
      turno:'',analista:account?account.email:'',producto:'TT_FLOC',productoLabel:'Floculante',
      tipoMuestra:'',numAcopio:'',
      pesoInicial:'',pesoFinal:'',granu:[],pesoFondo:null,
      pctHumedad:'',quimica:{},
      observaciones:estado?estado+' — dilucion '+flocDil+' g':'',
      extra:{horario:horario,solucionMl:solucion,flocMadreG:flocMadre,flocDilG:flocDil,
             concMadreGl:concMadre,concDilGl:concDil,estado:estado},
      horaSalida:horario,
    };
    addPending(data);
    if(estado==='NO CUMPLE'){
      sendAlertaEmail(data,[{param:'Floculante dilucion',valor:flocDil+' g',limite:'0,004 – 0,016 g',spec:''}],account);
    }
    try{
      await sendTurcoToSupabase(data,account);
      delPending(data.id);setSending(false);
      onSuccess(estado==='NO CUMPLE'
        ?'Registro enviado — ATENCION: floculante NO CUMPLE (se envio alerta).'
        :'Registro de floculante enviado exitosamente.');
    }catch(err){
      console.error(err);setSending(false);
      onSuccess('Sin conexion: registro guardado localmente como pendiente.');
    }
  }

  var estadoColor=estado==='CUMPLE'?'var(--success)':estado==='NO CUMPLE'?'var(--error)':'var(--text-muted)';

  return(
    <div>
      <TurcoPageHdr onBack={onBack} sub="Floculante"/>
      <TurcoErrBox errors={errors}/>
      <SecCard title="Control de Floculante" icon="&#129524;">
        <div className="fg fg-2" style={{marginBottom:14}}>
          <Field name="fechaFL" label="Fecha" type="date" required value={fecha}
            onChange={function(e){setFecha(e.target.value);}} error={errors.fecha}/>
          <Field name="horaFL" label="Horario" type="time" required value={horario}
            onChange={function(e){setHorario(e.target.value);}} error={errors.horario}/>
        </div>
        <div className="fg fg-2" style={{marginBottom:14}}>
          <Field name="solFL" label="Solucion (mL)" type="decimal" required value={solucion}
            onChange={function(e){setSolucion(e.target.value);}} error={errors.solucion} placeholder="0"/>
          <Field name="madreFL" label="Floculante Madre (g)" type="decimal" required value={flocMadre}
            onChange={function(e){setFlocMadre(e.target.value);}} error={errors.flocMadre} placeholder="0,000"/>
        </div>
        <div className="fg fg-2" style={{marginBottom:14}}>
          <Field name="dilFL" label="Floculante Dilucion (g)" type="decimal" required value={flocDil}
            onChange={function(e){setFlocDil(e.target.value);}} error={errors.flocDil} placeholder="0,000"
            specHint="0,004 – 0,016 g"
            specSemVal={estado===null?'info':estado==='CUMPLE'?'ok':'error'}/>
          <div className="field">
            <label>Observaciones<span className="calc-badge">Calculado</span></label>
            <input type="text" readOnly className="f-ro" placeholder="—"
              value={estado||''} style={{fontWeight:800,color:estadoColor}}/>
          </div>
        </div>
        <div className="fg fg-2">
          <Field name="cmFL" label="Concentracion floculante madre (g/lt)" type="decimal" value={concMadre}
            onChange={function(e){setConcMadre(e.target.value);}} placeholder="0,00"/>
          <Field name="cdFL" label="Concentracion dilucion madre (g/lt)" type="decimal" value={concDil}
            onChange={function(e){setConcDil(e.target.value);}} placeholder="0,00"/>
        </div>
      </SecCard>
      <div className="form-actions">
        <button className="btn btn-secondary" onClick={onBack}>Cancelar</button>
        <button className="btn btn-primary" disabled={sending} onClick={handleSend}>
          {sending?'Enviando...':'Registrar Floculante'}
        </button>
      </div>
    </div>
  );
}

/* Lodo: granulometria en gramos + controles -#100 y +#120 (max 10%) */
function TurcoLodoForm({account,onBack,onSuccess}){
  var sieves=SIEVE_CONFIG['TT_LODO']||[];
  var[fecha,setFecha]=useState(today());
  var[gv,setGv]=useState(Array(sieves.length).fill(''));
  var[pan,setPan]=useState('');
  var[errors,setErrors]=useState({});
  var[sending,setSending]=useState(false);
  var[reportModal,setReportModal]=useState(null);
  var[sendError,setSendError]=useState(null);
  var[retrying,setRetrying]=useState(false);

  function updGv(i,v){setGv(function(p){var n=p.slice();n[i]=v;return n;});}
  var sumG=gv.reduce(function(s,v){var n=parseDecimal(v);return s+(isNaN(n)?0:n);},0);
  var panN=parseDecimal(pan);
  var total=sumG+(isNaN(panN)?0:panN);
  var gc=useMemo(function(){return calcGranu('TT_LODO',gv,String(total).replace('.',','));},[gv,total]);
  // controles especiales
  var idx100=sieves.findIndex(function(s){return s.us==='#100';});
  var idx120=sieves.findIndex(function(s){return s.us==='#120';});
  var rows=gc.rows.filter(function(r){return !r.isFondo;});
  var acum100=idx100>=0&&rows[idx100]?rows[idx100].pctA:null;
  var acum120=idx120>=0&&rows[idx120]?rows[idx120].pctA:null;
  var menos100=acum100!=null&&total>0?100-acum100:null;
  var mas120=acum120!=null&&total>0?acum120:null;
  var mas120Mal=mas120!=null&&mas120>10;

  function validate(){
    var e={};
    if(!fecha)e.fecha='Fecha requerida';
    if(!gv.some(function(v){return v!=='';}))e.granu='Ingrese la granulometria';
    return e;
  }

  async function handleSend(){
    var e=validate();
    if(Object.keys(e).length){setErrors(e);window.scrollTo({top:0,behavior:'smooth'});return;}
    setErrors({});setSending(true);
    var now=new Date();
    var data={
      id:uid(),fecha:fecha,fechaEnvio:now.toISOString(),horaEnvio:now.toLocaleTimeString('es-CL'),
      turno:'',analista:account?account.email:'',producto:'TT_LODO',productoLabel:'Lodo',
      tipoMuestra:'',numAcopio:'',
      pesoInicial:'',pesoFinal:String(total).replace('.',','),granu:gv,pesoFondo:isNaN(panN)?0:panN,
      pctHumedad:'',quimica:{},observaciones:'',
      extra:{menos100:menos100,mas120:mas120},
    };
    addPending(data);
    setSendError(null);
    var violations=collectViolations(data,gc);
    if(violations.length)sendAlertaEmail(data,violations,account);
    try{
      await sendTurcoToSupabase(data,account);
      delPending(data.id);setSending(false);
      setReportModal({data:data,gc:gc,violations:violations,msg:'Registro de lodo enviado exitosamente.'});
    }catch(err){
      console.error(err);setSending(false);
      setSendError(buildDbError(err));
      setReportModal({data:data,gc:gc,violations:violations,msg:''});
    }
  }

  async function handleRetry(){
    if(!reportModal)return;
    setRetrying(true);setSendError(null);
    try{
      await sendTurcoToSupabase(reportModal.data,account);
      delPending(reportModal.data.id);setRetrying(false);
      setReportModal(function(prev){return Object.assign({},prev,{msg:'Registro de lodo enviado exitosamente.'});});
    }catch(err){
      console.error(err);setRetrying(false);setSendError(buildDbError(err));
    }
  }

  if(reportModal){
    return(
      <ReportModal
        data={reportModal.data} gc={reportModal.gc} violations={reportModal.violations}
        sendError={sendError} retrying={retrying} onRetry={handleRetry}
        onClose={function(){
          setReportModal(null);setSendError(null);
          onSuccess(sendError?'Registro guardado localmente como pendiente.':reportModal.msg);
        }}/>
    );
  }

  function chip(label,val,bad){
    return(
      <div style={{padding:'10px 16px',borderRadius:10,minWidth:130,textAlign:'center',
        background:bad?'#fff5f5':'#f7fafc',border:'1.5px solid '+(bad?'#c53030':'var(--border)')}}>
        <div style={{fontSize:'.74rem',fontWeight:700,color:'var(--text-secondary)'}}>{label}</div>
        <div style={{fontSize:'1.1rem',fontWeight:800,color:bad?'#c53030':'var(--text)'}}>
          {val!=null?fmt(val,2)+' %':'—'}
        </div>
      </div>
    );
  }

  return(
    <div>
      <TurcoPageHdr onBack={onBack} sub="Lodo"/>
      <TurcoErrBox errors={errors}/>
      <SecCard title="Informacion General" icon="&#128203;">
        <div style={{maxWidth:240}}>
          <Field name="fechaLO" label="Fecha" type="date" required value={fecha}
            onChange={function(e){setFecha(e.target.value);}} error={errors.fecha}/>
        </div>
      </SecCard>
      <SecCard title="Analisis Granulometrico (g)" icon="&#128300;">
        <div className="fg-quim">
          {sieves.map(function(s,i){
            return <Field key={s.us} name={'lo'+i} label={s.us+' ('+s.mm+' mm) g'} type="decimal"
              value={gv[i]} onChange={function(e){updGv(i,e.target.value);}} placeholder="0,00"/>;
          })}
          <Field name="loPan" label="PAN (g)" type="decimal" value={pan}
            onChange={function(e){setPan(e.target.value);}} placeholder="0,00"/>
          <div className="field">
            <label>TOTAL (g)<span className="calc-badge">Calculado</span></label>
            <input type="text" readOnly className="f-ro" value={total?fmt(total,2):''} style={{fontWeight:700}}/>
          </div>
        </div>
        {errors.granu&&<div style={{color:'var(--error)',fontSize:'.84rem',marginTop:9,fontWeight:600}}>
          Aviso: {errors.granu}
        </div>}
      </SecCard>
      <SecCard title="Especificacion Especial" icon="&#128202;">
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {chip('-#100 (pasante)',menos100,false)}
          {chip('+#120 (ret. acum.)',mas120,mas120Mal)}
        </div>
        {mas120Mal&&(
          <div style={{marginTop:10,color:'#c53030',fontWeight:700,fontSize:'.88rem'}}>
            🚨 +#120 supera el 10% — fuera de norma
          </div>
        )}
      </SecCard>
      <div className="form-actions">
        <button className="btn btn-secondary" onClick={onBack}>Cancelar</button>
        <button className="btn btn-primary" disabled={sending} onClick={handleSend}>
          {sending?'Enviando...':'Registrar Lodo'}
        </button>
      </div>
    </div>
  );
}

                      {value:'Acopio 5',label:'Acopio 5'},{value:'Acopio 6',label:'Acopio 6'},
                      {value:'Acopio 7',label:'Acopio 7'},{value:'Emergencia',label:'Emergencia'},

                    value={numAcopio} onChange={function(e){setNumAcopio(e.target.value);}}

          <SecCard title="Informacion General" icon="&#128203;">
            <div className="fg fg-2" style={{marginBottom:14}}>
              <Field name="fecha" label="Fecha de muestreo" type="date" required value={fecha}
                onChange={function(e){setFecha(e.target.value);}} error={errors.fecha}

          <SecCard title={'Granulometria — '+(GRANU_TITLE[producto]||prodLabel3)} icon="&#128300;">

          {cfg.humedad&&(

                  onChange={function(e){setPctHumedad(e.target.value);}} error={errors.pctHumedad} placeholder="0,00"

          {cfg.quimica&&(

                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{sio2:e.target.value});});}} error={errors.sio2} placeholder="0,00"
                  specHint={specChemHint(qspec.SiO2)} specSemVal={specSem(quimica.sio2,qspec.SiO2)}/>
                <Field name="al2o3" label="Al₂O₃ (%)" type="decimal" required value={quimica.al2o3}
                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{al2o3:e.target.value});});}} error={errors.al2o3} placeholder="0,00"
                  specHint={specChemHint(qspec.Al2O3)} specSemVal={specSem(quimica.al2o3,qspec.Al2O3)}/>
                <Field name="fe2o3" label="Fe₂O₃ (%)" type="decimal" required value={quimica.fe2o3}
                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{fe2o3:e.target.value});});}} error={errors.fe2o3} placeholder="0,00"
                  specHint={specChemHint(qspec.Fe2O3)} specSemVal={specSem(quimica.fe2o3,qspec.Fe2O3)}/>
                <Field name="cao" label="CaO (%)" type="decimal" required value={quimica.cao}
                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{cao:e.target.value});});}} error={errors.cao} placeholder="0,00"
                  specHint={specChemHint(qspec.CaO)} specSemVal={specSem(quimica.cao,qspec.CaO)}/>
                <Field name="mgo" label="MgO (%)" type="decimal" required value={quimica.mgo}
                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{mgo:e.target.value});});}} error={errors.mgo} placeholder="0,00"
                  specHint={specChemHint(qspec.MgO)} specSemVal={specSem(quimica.mgo,qspec.MgO)}/>
                <Field name="k2o" label="K₂O (%)" type="decimal" required value={quimica.k2o}
                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{k2o:e.target.value});});}} error={errors.k2o} placeholder="0,00"
                  specHint={specChemHint(qspec.K2O)} specSemVal={specSem(quimica.k2o,qspec.K2O)}/>
                <Field name="na2o" label="Na₂O (%)" type="decimal" required value={quimica.na2o}
                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{na2o:e.target.value});});}} error={errors.na2o} placeholder="0,00"
                  specHint={specChemHint(qspec.Na2O)} specSemVal={specSem(quimica.na2o,qspec.Na2O)}/>
                <Field name="tio2" label="TiO₂ (%)" type="decimal" required value={quimica.tio2}
                  onChange={function(e){setQuimica(function(p){return Object.assign({},p,{tio2:e.target.value});});}} error={errors.tio2} placeholder="0,00"
                  specHint={specChemHint(qspec.TiO2)} specSemVal={specSem(quimica.tio2,qspec.TiO2)}/>
                <div className="field">
                  <label>K₂O + Na₂O (%)<span className="calc-badge">Calculado</span></label>
                  {(function(){
                    var k2na2val=(parseDecimal(quimica.k2o)||0)+(parseDecimal(quimica.na2o)||0);
                    var kns=qspec.K2O_Na2O;
                    var knSem=kns?calcSemaforo(k2na2val,kns.min,kns.max):'info';
                    var knBg=knSem==='error'?'rgba(197,48,48,.07)':knSem==='warning'?'rgba(183,121,31,.07)':knSem==='ok'?'rgba(39,103,73,.07)':'';
                    var knHint=specChemHint(kns);
                    return(<>
                      <input type="text" readOnly className="f-ro" placeholder="—"
                        style={knBg?{background:knBg}:{}}
                        value={(quimica.k2o||quimica.na2o)?fmt(k2na2val):''}/>
                      {knHint&&<span className="fhint" style={{color:knSem==='error'?'#c53030':knSem==='warning'?'#b7791f':knSem==='ok'?'#276749':'#888'}}>{knHint}</span>}
                    </>);
                  })()}
                </div>
              </div>
            </SecCard>
          )}

          <SecCard title="Observaciones" icon="&#128221;">
            <Field name="obs" label="Observaciones" type="textarea" value={obs}
              onChange={function(e){if(e.target.value.length<=300)setObs(e.target.value);}}
              placeholder="Observaciones adicionales (opcional)" maxLength={300}/>
            <div className="cc">{obs.length}/300</div>
          </SecCard>

          <div className="form-actions">
            <button className="btn btn-secondary" onClick={onBack}>Cancelar</button>
            <button className="btn btn-primary" onClick={handleReview}>Revisar &#8594;</button>
          </div>
        </div>
      )}
    </div>
  );
}

var ACOPIO_OPTS=['Acopio 1','Acopio 2','Acopio 3','Acopio 4','Acopio 5','Acopio 6','Acopio 7','Emergencia'];
var PROD_LABEL_MAP={'A36':'A36 TLH','A38':'A38 Fierrillo','ALIM':'Alimentacion'};

const MESES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

/* ── DASHBOARD SCREEN ── */
function DashboardScreen({account,onBack}){
  var[records,setRecords]=useState([]);
  var[loading,setLoading]=useState(true);
  var[tab,setTab]=useState('granu');
  var[prod,setProd]=useState('A36');
  var[plantaFiltro,setPlantaFiltro]=useState('Arenas');
  var[eettOpen,setEettOpen]=useState(false);
  var[periodType,setPeriodType]=useState('month');
  var[selWeek,setSelWeek]=useState(function(){
    var d=new Date(),dc=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    var dn=dc.getUTCDay()||7;dc.setUTCDate(dc.getUTCDate()+4-dn);
    var ys=new Date(Date.UTC(dc.getUTCFullYear(),0,1));
    return Math.ceil((((dc-ys)/86400000)+1)/7);
  });
  var[selMonth,setSelMonth]=useState(function(){return new Date().getMonth();});
  var[selYear,setSelYear]=useState(function(){return new Date().getFullYear();});
  var[custFrom,setCustFrom]=useState('');
  var[custTo,setCustTo]=useState('');
  var[filterTurno,setFilterTurno]=useState('');
  var[filterAnalista,setFilterAnalista]=useState('');
  var[maWin,setMaWin]=useState(5);
  var[showMA,setShowMA]=useState(false);
  var[showAvg,setShowAvg]=useState(true);
  var[showLims,setShowLims]=useState(true);
  var[filterTipoMuestra,setFilterTipoMuestra]=useState(['Puntual','Acopio']);
  var[filterNumAcopio,setFilterNumAcopio]=useState(ACOPIO_OPTS.slice());
  // chart refs — granu curves
  var cParRef=useRef(null);var cPasRef=useRef(null);
  var iParRef=useRef(null);var iPasRef=useRef(null);
  // 6 trend chart slots (3 rows × 2)
  var tr0=useRef(null);var tr1=useRef(null);var tr2=useRef(null);
  var tr3=useRef(null);var tr4=useRef(null);var tr5=useRef(null);
  var tInsts=useRef([null,null,null,null,null,null]);
  // chemistry chart
  var cQRef=useRef(null);var iQRef=useRef(null);
  // per-oxide chemistry charts
  var chemRefs=useRef({});var chemInsts=useRef({});
  var logoSrc=useMemo(function(){var img=document.querySelector('.hdr-brand img');return img?img.src:'';},[]);

  useEffect(function(){loadData();},[]);
  useEffect(function(){
    setFilterTipoMuestra(['Puntual','Acopio']);
    setFilterNumAcopio(ACOPIO_OPTS.slice());
  },[prod]);

  async function loadData(){
    setLoading(true);
    var cloud=[];
    try{cloud=await loadEnsayos();}catch(e){console.error(e);}
    var pendingA=getPending().map(function(r){return Object.assign({},r,{_src:'local'});});
    var pendingC=getPendingCuarzo().map(function(r){return Object.assign({},r,{_src:'local'});});
    var ids=new Set(cloud.map(function(r){return r.ID;}));
    var merged=cloud.concat(pendingA.filter(function(r){return !ids.has(r.id);}))
                    .concat(pendingC.filter(function(r){return !ids.has(r.id);}));
    merged.sort(function(a,b){return(a.FechaMuestreo||a.fecha||'').localeCompare(b.FechaMuestreo||b.fecha||'');});
    setRecords(merged);setLoading(false);
  }

  function getDateRange(){
    if(periodType==='week'){
      var jan4=new Date(selYear,0,4);
      var d1=jan4.getDay()||7;
      var w1Mon=new Date(jan4.getTime()-(d1-1)*86400000);
      var wStart=new Date(w1Mon.getTime()+(selWeek-1)*7*86400000);
      var wEnd=new Date(wStart.getTime()+6*86400000);
      return{from:wStart.toISOString().slice(0,10),to:wEnd.toISOString().slice(0,10)};
    }
    if(periodType==='month'){
      return{from:new Date(selYear,selMonth,1).toISOString().slice(0,10),
             to:new Date(selYear,selMonth+1,0).toISOString().slice(0,10)};
    }
    if(periodType==='year')return{from:selYear+'-01-01',to:selYear+'-12-31'};
    return{from:custFrom||'1900-01-01',to:custTo||'2099-12-31'};
  }

  function getPeriodoLabel(){
    if(periodType==='week')return 'Sem'+selWeek+'-'+selYear;
    if(periodType==='month')return MN[selMonth]+'-'+selYear;
    if(periodType==='year')return String(selYear);
    return (custFrom||'?')+'/'+( custTo||'?');
  }

  function fmtXDate(s){
    if(!s)return'';
    var d=new Date(s+'T12:00:00');
    return d.getDate()+'/'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+' '+MN[d.getMonth()];
  }

  function movAvg(arr,w){
    return arr.map(function(v,i){
      var sl=arr.slice(Math.max(0,i-w+1),i+1).filter(function(x){return x!==null&&!isNaN(x);});
      return sl.length?sl.reduce(function(a,b){return a+b;},0)/sl.length:null;
    });
  }

  function getFilename(suffix){
    var now=new Date();
    var dd=String(now.getDate()).padStart(2,'0'),mm2=String(now.getMonth()+1).padStart(2,'0');
    var tipoLbl='';
    if(prod==='A36'){
      var hP=filterTipoMuestra.includes('Puntual'),hA=filterTipoMuestra.includes('Acopio');
      if(!hP&&hA){
        if(filterNumAcopio.length===ACOPIO_OPTS.length)tipoLbl='_TodosAcopios';
        else if(filterNumAcopio.length===1)tipoLbl='_'+filterNumAcopio[0].replace(' ','');
        else tipoLbl='_'+filterNumAcopio.map(function(a){return a.replace('Acopio ','A').replace('Emergencia','Emg');}).join('-');
      }else if(hP&&!hA)tipoLbl='_Puntual';
    }
    return 'Reporte_'+(GRANU_TITLE[prod]||prod).replace(/\s/g,'_')+tipoLbl+'_'+getPeriodoLabel()+'_'+suffix+'_'+dd+'-'+mm2+'-'+now.getFullYear()+'.png';
  }

  async function exportarReporte(){
    var opts={scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false,windowWidth:1200};
    try{
      var p1=document.getElementById('export-page1');
      if(p1){
        var c1=await window.html2canvas(p1,opts);
        var a1=document.createElement('a');a1.download=getFilename('Gran');a1.href=c1.toDataURL('image/png');a1.click();
      }
      await new Promise(function(res){setTimeout(res,500);});
      var p2=document.getElementById('export-page2');
      if(p2){
        var c2=await window.html2canvas(p2,opts);
        var a2=document.createElement('a');a2.download=getFilename('Tend');a2.href=c2.toDataURL('image/png');a2.click();
      }
    }catch(e){console.error('Export',e);}
  }

  /* Analistas disponibles: union de los presentes en los registros +
     los por defecto (Arenas y Turco), para que aparezcan todos */
  var analistaOpts=useMemo(function(){
    var set={};
    ANALISTAS_DEFAULT.concat(ANALISTAS_TURCO_DEFAULT).forEach(function(a){set[a.value]=true;});
    records.forEach(function(r){var a=r.Analista||r.analista;if(a)set[a]=true;});
    return Object.keys(set).sort();
  },[records]);

  var filtered=useMemo(function(){
    var dr=getDateRange();
    return records.filter(function(r){
      var fecha=r.FechaMuestreo||r.fecha||'';
      if(fecha<dr.from||fecha>dr.to)return false;
      var rProdKey=r.ProductoKey||r.producto||'';
      var rProdLabel=r.Produto||r.Producto||r.productoLabel||'';
      if(rProdKey){if(rProdKey!==prod)return false;}
      else{var legacyKey={A36:'A36',A38:'A38',ALIM:'Alim'}[prod]||prod;if(!rProdLabel.includes(legacyKey))return false;}
      if(filterTurno&&(r.Turno||r.turno)!==filterTurno)return false;
      if(filterAnalista&&(r.Analista||r.analista)!==filterAnalista)return false;
      if(prod==='A36'){
        var tm=r.TipoMuestra||r.tipoMuestra||'';
        if(tm&&!filterTipoMuestra.includes(tm))return false;
        if(tm==='Acopio'&&filterTipoMuestra.includes('Acopio')){
          var na=r.NumAcopio||r.numAcopio||'';
          if(na&&!filterNumAcopio.includes(na))return false;
        }
      }
      return true;
    });
  },[records,prod,periodType,selWeek,selMonth,selYear,custFrom,custTo,filterTurno,filterAnalista,filterTipoMuestra,filterNumAcopio]);

  /* % cumplimiento EETT del periodo: evalua cada ensayo filtrado con
     collectViolations (mismas reglas que la alerta del informe) */
  var cumplimiento=useMemo(function(){
    var sieves=SIEVE_CONFIG[prod]||[];
    if(!sieves.length)return null;
    var evaluados=0,fuera=0;
    filtered.forEach(function(r){
      var gv=(r.granu&&Array.isArray(r.granu))?r.granu
        :sieves.map(function(s){return String(r[s.us+'_'+s.mm+'g']||0);});
      var pf=String(r.PesoFinal!==undefined?r.PesoFinal:r.pesoFinal!==undefined?r.pesoFinal:0);
      if(!parseDecimal(pf))return;
      var gc=calcGranu(prod,gv,pf);
      var data={producto:prod,quimica:r.quimica||{},
        pctHumedad:String(r.PctHumedad!==undefined?r.PctHumedad:r.pctHumedad!==undefined?r.pctHumedad:'')};
      var v=collectViolations(data,gc);
      evaluados++;
      if(v.length)fuera++;
    });
    if(!evaluados)return null;
    return{evaluados:evaluados,fuera:fuera,ok:evaluados-fuera,
      pct:Math.round((evaluados-fuera)/evaluados*1000)/10};
  },[filtered,prod]);

  /* Resumen ejecutivo: cumplimiento por producto de TODAS las plantas
     en el periodo seleccionado (independiente del producto elegido) */
  var resumen=useMemo(function(){
    if(tab!=='resumen'&&tab!=='general')return null;
    var dr=getDateRange();
    var perProd={};
    records.forEach(function(r){
      var fecha=r.FechaMuestreo||r.fecha||'';
      if(fecha<dr.from||fecha>dr.to)return;
      if(filterTurno&&(r.Turno||r.turno)!==filterTurno)return;
      var pk=r.ProductoKey||r.producto||'';
      if(!pk||!SIEVE_CONFIG[pk])return;
      var sieves=SIEVE_CONFIG[pk];

  function computeStats(row){
    var sieves=SIEVE_CONFIG[prod]||[];
    var pf=parseDecimal(row.PesoFinal||row.pesoFinal);
    if(!pf||pf<=0)return null;
    var acum=0,stats={};
    sieves.forEach(function(s,i){
      // Priorizar granu array (Supabase), fallback a columnas planas (legacy)
      var peso;
      if(row.granu&&Array.isArray(row.granu)&&row.granu[i]!=null){
        peso=parseDecimal(row.granu[i])||0;
      }else{
        peso=parseDecimal(row[s.us+'_'+s.mm+'g'])||0;
      }
      var pctP=(peso/pf)*100;
      acum+=pctP;
      stats[s.us]={pctP:pctP,pctA:acum,pctPas:100-acum};
    });
    function interp(thr){
      for(var i=0;i<sieves.length-1;i++){
        var s1=stats[sieves[i].us],s2=stats[sieves[i+1].us];
        if(!s1||!s2)continue;
        if(s1.pctPas>=thr&&s2.pctPas<thr){
          var m1=parseFloat(sieves[i].mm.replace(',','.')),m2=parseFloat(sieves[i+1].mm.replace(',','.'));
          return s1.pctPas===s2.pctPas?m1:m1+(m2-m1)*(s1.pctPas-thr)/(s1.pctPas-s2.pctPas);
        }
      }
      return null;
    }
    stats._d50=interp(50);stats._p80=interp(80);stats._p20=interp(20);
    var _pg=['#16','#18','#20','#30','#35','#40'];
    stats._plusG40=_pg.reduce(function(s,us){return s+(stats[us]?stats[us].pctP:0);},0);
    return stats;
  }

      if(showMA)ds.push({label:'MA'+maWin,data:ma,borderColor:'#e67e22',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.4,spanGaps:true,borderDash:[4,2]});
      if(showAvg)ds.push({label:'Prom.',data:vals.map(function(){return pAvg;}),borderColor:'#aaa',backgroundColor:'transparent',borderWidth:1,pointRadius:0,spanGaps:true,borderDash:[3,3]});
      if(showLims&&ctrl.limMax!=null)ds.push({label:'Lím',data:vals.map(function(){return ctrl.limMax;}),borderColor:'#c53030',backgroundColor:'transparent',borderWidth:1,pointRadius:0,borderDash:[6,3],spanGaps:true});
      if(showLims&&ctrl.limMin!=null)ds.push({label:'Lím',data:vals.map(function(){return ctrl.limMin;}),borderColor:'#c53030',backgroundColor:'transparent',borderWidth:1,pointRadius:0,borderDash:[6,3],spanGaps:true});
      tInsts.current[i]=new window.Chart(trList[i].current,{type:'line',
        data:{labels:tLbls,datasets:ds},
        options:{animation:{duration:0},responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{font:{size:7,family:'Inter'},maxRotation:45,maxTicksLimit:8}},y:{ticks:{font:{size:8,family:'Inter'}}}}}});
    });
    return function(){tInsts.current.forEach(function(inst,i){if(inst){inst.destroy();tInsts.current[i]=null;}});};
  },[tab,filtered,prod,maWin,allCtrls,showMA,showAvg,showLims,turcoRecInds]);

  // === CHART: Chemistry (un grafico por oxido, estilo tendencias EETT) ===
  useEffect(function(){
    if(tab!=='quim'||!window.Chart)return;
    Object.keys(chemInsts.current).forEach(function(k){
      if(chemInsts.current[k]){chemInsts.current[k].destroy();chemInsts.current[k]=null;}
    });
    var lbs=filtered.map(function(r){return fmtXDate(r.FechaMuestreo||r.fecha);});
    chemStats.forEach(function(st){
      var el=chemRefs.current[st.ctrl.key];
      if(!el)return;
      var c=st.ctrl;
      var semC=st.vals.map(function(v){return SEM_COLOR[calcSemaforo(v,c.limMin,c.limMax)]||'#888';});
      var ds=[
        {label:c.label,data:st.vals.map(function(v){return v!=null?+v.toFixed(3):null;}),
          borderColor:c.color,backgroundColor:'transparent',borderWidth:1.5,pointRadius:3,
          pointBackgroundColor:semC,tension:.3,spanGaps:true},
      ];
      if(showMA)ds.push({label:'MA'+maWin,data:st.ma,borderColor:'#e67e22',backgroundColor:'transparent',
        borderWidth:2,pointRadius:0,tension:.4,spanGaps:true,borderDash:[4,2]});
      if(showAvg&&st.avg!=null)ds.push({label:'Prom.',data:st.vals.map(function(){return st.avg;}),
        borderColor:'#aaa',backgroundColor:'transparent',borderWidth:1,pointRadius:0,spanGaps:true,borderDash:[3,3]});
      if(showLims&&c.limMax!=null)ds.push({label:'Lím.Máx',data:st.vals.map(function(){return c.limMax;}),
        borderColor:'#c53030',backgroundColor:'transparent',borderWidth:1.2,pointRadius:0,borderDash:[6,3],spanGaps:true});
      if(showLims&&c.limMin!=null)ds.push({label:'Lím.Mín',data:st.vals.map(function(){return c.limMin;}),
        borderColor:'#276749',backgroundColor:'transparent',borderWidth:1.2,pointRadius:0,borderDash:[6,3],spanGaps:true});
      chemInsts.current[st.ctrl.key]=new window.Chart(el,{type:'line',
        data:{labels:lbs,datasets:ds},
        options:{animation:{duration:0},responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{font:{size:7,family:'Inter'},maxRotation:45,maxTicksLimit:8}},
                  y:{ticks:{font:{size:8,family:'Inter'}}}}}});
    });
    return function(){
      Object.keys(chemInsts.current).forEach(function(k){
        if(chemInsts.current[k]){chemInsts.current[k].destroy();chemInsts.current[k]=null;}
      });
    };
  },[tab,chemStats,filtered,maWin,showMA,showAvg,showLims]);

  // === RENDER HELPERS ===
  function getTRef(i){return [tr0,tr1,tr2,tr3,tr4,tr5][i]||null;}

  function varBadge(v,label,isLow,isInfo){
    if(v===null||v===undefined||isNaN(v))return null;
    var dp=Math.abs(v)<0.01?3:2;
    if(isInfo){
      var cls2=v===0?'neu':v>0?'inf-pos':'inf-neg';
      return <span className={'tkp-vb '+cls2}>{label} {(v>0?'+':'')+fmt(v,dp)}</span>;
    }
    var isPos=isLow?v<0:v>0;
    var cls=v===0?'neu':isPos?'pos':'neg';
    return <span className={'tkp-vb '+cls}>{label} {(v>0?'+':'')+fmt(v,dp)}</span>;
  }

  function kpiPanelRow(stat){
    if(!stat)return null;
    var semC=SEM_COLOR[stat.sem]||'#999';
    var isLow=stat.limMax!=null&&stat.limMin===null;
    var isInfo=stat.limMin===null&&stat.limMax===null;
    var dp=stat.key==='_d50'||stat.key==='_p80'||stat.key==='_p20'?3:2;
    var ult5Lbl=(stat.ult5N!=null&&stat.ult5N<5)?'ult'+stat.ult5N:'ult5';
    return(
      <div>
        <div className="tkp-name">{stat.label}</div>
        <div className="tkp-val" style={{color:isInfo?'var(--text)':semC}}>
          {stat.last!=null?fmt(stat.last,dp):'-'}
          {stat.limMax!=null&&<span style={{fontSize:'.61rem',color:'#bbb',fontWeight:400,marginLeft:3}}>/ ≤{stat.limMax}</span>}
          {stat.limMin!=null&&stat.limMax===null&&<span style={{fontSize:'.61rem',color:'#bbb',fontWeight:400,marginLeft:3}}>/ ≥{stat.limMin}</span>}
        </div>
        <div className="tkp-vars">
          {varBadge(stat.antVar,'ant',isLow,isInfo)}
          {varBadge(stat.ult5Var,ult5Lbl,isLow,isInfo)}
          {varBadge(stat.perVar,'per',isLow,isInfo)}
        </div>
      </div>
    );
  }

  function lineTogglesBar(){
    function tg(val,set,lbl,col){
      return(
        <label style={{display:'inline-flex',alignItems:'center',gap:5,cursor:'pointer',
          padding:'3px 10px',borderRadius:14,fontSize:'.76rem',fontWeight:600,
          background:val?'var(--primary-xlight)':'#f0f0f0',
          color:val?'var(--primary)':'var(--text-muted)',
          border:'1px solid '+(val?'var(--primary-light)':'var(--border)')}}>
          <input type="checkbox" checked={val} style={{accentColor:col||'var(--primary)',margin:0}}
            onChange={function(e){set(e.target.checked);}}/>
          {lbl}
        </label>
      );
    }
    return(
      <div className="ma-bar" style={{flexWrap:'wrap'}}>
        <span>Promedio movil:</span>
        <select value={maWin} onChange={function(e){setMaWin(parseInt(e.target.value));}}>
          <option value="5">5 periodos</option><option value="7">7 periodos</option>
          <option value="10">10 periodos</option><option value="30">30 periodos</option>
        </select>
        <span style={{marginLeft:8}}>Mostrar:</span>
        {tg(showMA,setShowMA,'Móvil','#e67e22')}
        {tg(showAvg,setShowAvg,'Promedio','#888')}
        {tg(showLims,setShowLims,'Límites EETT','#c53030')}
        <span style={{color:'var(--text-muted)',fontWeight:400}}>({filtered.length} registros)</span>
      </div>
    );
  }

  function expHdr(){
    return(
      <div className="exp-hdr">
        {logoSrc&&<img src={logoSrc} style={{height:42,objectFit:'contain'}} alt="MIGRIN"/>}
        <div>
          <div style={{fontSize:'.95rem',fontWeight:800,color:'var(--primary)'}}>Reporte de Calidad — MIGRIN</div>
          <div style={{fontSize:'.76rem',color:'var(--text-secondary)',marginTop:2}}>
            <strong>{GRANU_TITLE[prod]||prod}</strong>
            {' · '}{getPeriodoLabel()}
            {filterTurno?' · Turno '+filterTurno:' · Todos turnos'}
            {filterAnalista?' · '+filterAnalista:' · Todos analistas'}
            {prod==='A36'&&filterTipoMuestra.length<2&&(' · '+filterTipoMuestra.join(', '))}
            {' · '}<strong>{filtered.length} registros</strong>
          </div>
        </div>
      </div>
    );
  }

  // Trend rows: pair allCtrls 0-1, 2-3, 4-5
  var trendRows=[];
  for(var tri=0;tri<Math.min(allCtrls.length,6);tri+=2){
    trendRows.push({
      left:allCtrls[tri],right:allCtrls[tri+1]||null,
      lStat:ctrlStats[tri],rStat:ctrlStats[tri+1]||null,
      lRef:getTRef(tri),rRef:getTRef(tri+1),
    });
  }
  var hasChem=!!(PRODUCT_CONFIG[prod]&&PRODUCT_CONFIG[prod].quimica);
  var hasSpecs=ctrlStats.length>0;

  /* Panel de Especificación (EETT) visible en el reporte.
     Muestra los límites del producto; si no tiene EETT, muestra
     otros detalles del formulario. */
  function rng(min,max){
    if(min!=null&&max!=null)return fmt(min,2)+' – '+fmt(max,2);
    if(max!=null)return '≤ '+fmt(max,2);
    if(min!=null)return '≥ '+fmt(min,2);
    return '—';
  }
  function bandLim(g){
    var parts=[];
    if(g.retAcumMin!=null||g.retAcumMax!=null)parts.push('Ret.Acum '+rng(g.retAcumMin,g.retAcumMax));
    if(g.retMin!=null||g.retMax!=null)parts.push('Ret.Parc '+rng(g.retMin,g.retMax));
    if(g.pasMin!=null||g.pasMax!=null)parts.push('Pasante '+rng(g.pasMin,g.pasMax));
    return parts.join(' · ');
  }
  function specTable(sp,titulo){
    var gKeys=sp.granulometria?Object.keys(sp.granulometria).filter(function(us){return bandLim(sp.granulometria[us]);}):[];
    var qKeys=sp.quimica?Object.keys(sp.quimica).filter(function(el){var s=sp.quimica[el];return s&&(s.min!=null||s.max!=null);}):[];
    var hasHum=sp.humedad&&sp.humedad.max!=null;
    var hasD50=sp.d50Max!=null;
    if(!gKeys.length&&!qKeys.length&&!hasHum&&!hasD50)return null;
    var thS={textAlign:'left',padding:'4px 10px',fontSize:'.72rem',color:'#fff',background:'var(--primary)',fontWeight:700};
    var tdS={padding:'4px 10px',fontSize:'.8rem',borderBottom:'1px solid #f0f0f0'};
    return(
      <div key={titulo||'spec'} style={{marginBottom:14}}>
        {titulo&&<div style={{fontWeight:700,fontSize:'.8rem',color:'var(--primary)',marginBottom:6}}>{titulo}</div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr',gap:14}}>
          {gKeys.length>0&&(
            <div style={{overflowX:'auto'}}>
              <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>GRANULOMETRÍA</div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr><th style={thS}>Tamiz</th><th style={thS}>Límite (%)</th></tr></thead>
                <tbody>
                  {gKeys.map(function(us){return(
                    <tr key={us}><td style={Object.assign({fontWeight:700},tdS)}>{us}</td>
                      <td style={tdS}>{bandLim(sp.granulometria[us])}</td></tr>
                  );})}
                </tbody>
              </table>
            </div>
          )}
          {(qKeys.length>0||hasHum||hasD50)&&(
            <div style={{overflowX:'auto'}}>
              <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>QUÍMICA / OTROS</div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr><th style={thS}>Parámetro</th><th style={thS}>Límite</th></tr></thead>
                <tbody>
                  {qKeys.map(function(el){var s=sp.quimica[el];return(
                    <tr key={el}><td style={Object.assign({fontWeight:700},tdS)}>{el.replace('_','+')}</td>
                      <td style={tdS}>{rng(s.min,s.max)} %</td></tr>
                  );})}
                  {hasD50&&<tr><td style={Object.assign({fontWeight:700},tdS)}>D50</td><td style={tdS}>≤ {fmt(sp.d50Max,3)} mm</td></tr>}
                  {hasHum&&<tr><td style={Object.assign({fontWeight:700},tdS)}>Humedad</td><td style={tdS}>≤ {fmt(sp.humedad.max,2)} %</td></tr>}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    );
  }
  function turcoControlTable(){
    var defs=turcoIndicadores({producto:prod,granu:[],quimica:{},extra:{},PesoFinal:0})||[];
    if(!defs.length)return null;
    var thS={textAlign:'left',padding:'4px 10px',fontSize:'.72rem',color:'#fff',background:'var(--primary)',fontWeight:700};
    var tdS={padding:'4px 10px',fontSize:'.8rem',borderBottom:'1px solid #f0f0f0'};
    return(
      <div key="turcoctrl" style={{marginBottom:14,overflowX:'auto'}}>
        <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>GRANULOMETRÍA / CONTROLES</div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr><th style={thS}>Control</th><th style={thS}>Límite</th></tr></thead>
          <tbody>
            {defs.map(function(d){return(
              <tr key={d.label}><td style={Object.assign({fontWeight:700},tdS)}>{d.label}</td>
                <td style={tdS}>{d.tipo==='tendencia'?'No aplica (solo tendencia)':d.limLabel}</td></tr>
            );})}
          </tbody>
        </table>
      </div>
    );
  }
  function eettPanel(){
    var tables=[];
    if(prod==='A36'){
      tables.push(specTable(Object.assign({nombre:'Lirquen'},SPECS_A36.LIRQUEN),'Vidrios Lirquen'));
      tables.push(specTable(Object.assign({nombre:'Cristalerias'},SPECS_A36.CRISTALERIAS),'Cristalerias Chile'));
    }else if(prod.indexOf('TT_')===0){
      // Turco: controles granulometricos/AFS + quimica + humedad
      tables.push(turcoControlTable());
      var spT=EETT_LIVE[prod];
      if(spT&&(spT.quimica||spT.humedad))tables.push(specTable({quimica:spT.quimica,humedad:spT.humedad,granulometria:{}},null));
    }else{
      var sp=EETT_LIVE[prod];
      if(sp&&specHasLimits(sp))tables.push(specTable(sp,null));
    }
    tables=tables.filter(Boolean);
    var titulo=GRANU_TITLE[prod]||prod;
    var turcoHasInd=prod.indexOf('TT_')===0&&(turcoIndicadores({producto:prod,granu:[],quimica:{},extra:{},PesoFinal:0})||[]).length>0;
    if(tables.length===0){
      if(turcoHasInd)return null; // lo cubre el panel de indicadores de control
      // Sin EETT: detalles del formulario
      var det=NO_EETT_DETALLE[prod]||'Este producto no tiene EETT definida. El reporte muestra las tendencias y estadísticas de los valores registrados en el período.';
      return(
        <div className="sec-card" style={{marginBottom:16}}>
          <div className="sec-card-hdr" style={{fontSize:'.8rem',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}
            onClick={function(){setEettOpen(function(v){return !v;});}}>
            <span>Especificación (EETT) — {titulo}</span>
            <span style={{fontSize:'.9rem'}}>{eettOpen?'▲':'▼'}</span>
          </div>
          {eettOpen&&(
          <div style={{padding:'14px 16px'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:7,padding:'4px 12px',borderRadius:14,
              background:'#fff8e1',color:'#b7791f',border:'1px solid #f6e05e',fontSize:'.78rem',fontWeight:700,marginBottom:8}}>
              ⓘ Sin EETT definida
            </div>
            <div style={{fontSize:'.84rem',color:'var(--text-secondary)',lineHeight:1.5}}>{det}</div>
            <div style={{fontSize:'.74rem',color:'var(--text-muted)',marginTop:8}}>
              Un administrador puede cargar los límites desde <strong>Ajustes → Especificaciones (EETT)</strong>.
            </div>
          </div>
          )}
        </div>
      );
    }
    return(
      <div className="sec-card" style={{marginBottom:16}}>
        <div className="sec-card-hdr" style={{fontSize:'.8rem',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}
          onClick={function(){setEettOpen(function(v){return !v;});}}>
          <span>Especificación (EETT) — {titulo}</span>
          <span style={{fontSize:'.9rem'}}>{eettOpen?'▲ ocultar':'▼ ver'}</span>
        </div>
        {eettOpen&&<div style={{padding:'14px 16px'}}>{tables}</div>}
      </div>
    );
  }

  /* Indicadores de control Turco: evalúa el último ensayo del período. */
  function turcoIndPanel(){
    if(prod.indexOf('TT_')!==0)return null;
    var rec=filtered.length?filtered[filtered.length-1]:null;
    if(!rec)return null;
    var inds=turcoIndicadores({producto:prod,granu:rec.granu,quimica:rec.quimica,
      extra:rec.Extra||rec.extra,PesoFinal:rec.PesoFinal!==undefined?rec.PesoFinal:rec.pesoFinal});
    if(!inds||!inds.length)return null;
    var thS={textAlign:'left',padding:'5px 10px',fontSize:'.72rem',color:'#fff',background:'var(--primary)',fontWeight:700};
    var tdS={padding:'5px 10px',fontSize:'.82rem',borderBottom:'1px solid #f0f0f0'};
    return(
      <div className="sec-card" style={{marginBottom:16}}>
        <div className="sec-card-hdr" style={{fontSize:'.8rem',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          Indicadores de control — {GRANU_TITLE[prod]||prod}
          <span style={{fontSize:'.72rem',fontWeight:400,opacity:.8}}>último ensayo del período (folio #{rec.Folio||'—'})</span>
        </div>
        <div style={{padding:'10px 14px',overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr>
              <th style={thS}>Indicador</th><th style={Object.assign({textAlign:'center'},thS)}>Valor</th>
              <th style={thS}>Límite</th><th style={Object.assign({textAlign:'center'},thS)}>Estado</th>
            </tr></thead>
            <tbody>
              {inds.map(function(ind,i){
                var sc=SEM_COLOR[ind.estado]||'#999';
                return(
                  <tr key={i} style={{background:ind.estado==='error'?'#fff5f5':ind.estado==='warning'?'#fffbf0':''}}>
                    <td style={Object.assign({fontWeight:600},tdS)}>{ind.label}</td>
                    <td style={Object.assign({textAlign:'center',fontWeight:800,color:sc},tdS)}>
                      {ind.valor==null?'—':fmt(ind.valor,ind.unit==='g'?4:2)}{ind.unit?' '+ind.unit:''}
                    </td>
                    <td style={Object.assign({fontSize:'.74rem',color:'#666'},tdS)}>{ind.limLabel}</td>
                    <td style={Object.assign({textAlign:'center',fontWeight:700,color:sc,fontSize:'.74rem'},tdS)}>
                      {ind.tipo==='tendencia'?'—':(SEM_ICON[ind.estado]+' '+SEM_LABEL[ind.estado])}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{fontSize:'.7rem',color:'var(--text-muted)',marginTop:8}}>
            Indicadores marcados "tendencia" no tienen límite EETT — solo se observan en el tiempo.
          </div>
        </div>
      </div>
    );
  }

  // Period selector content
  var wks=[];for(var wi=1;wi<=52;wi++)wks.push(wi);
  var periodSel=(function(){
    if(periodType==='week')return(
      <div className="dff">
        <label>Semana</label>
        <select value={selWeek} onChange={function(e){setSelWeek(parseInt(e.target.value));}}>
          {wks.map(function(w){return <option key={w} value={w}>Sem {w}</option>;})}
        </select>
      </div>
    );
    if(periodType==='month')return(
      <div className="dff">
        <label>Mes</label>
        <select value={selMonth} onChange={function(e){setSelMonth(parseInt(e.target.value));}}>
          {MESES_FULL.map(function(m,i){return <option key={i} value={i}>{m}</option>;})}
        </select>
      </div>
    );
    if(periodType==='custom')return(
      <>
        <div className="dff"><label>Desde</label>
          <input type="date" value={custFrom} onChange={function(e){setCustFrom(e.target.value);}}/>
        </div>
        <div className="dff"><label>Hasta</label>
          <input type="date" value={custTo} onChange={function(e){setCustTo(e.target.value);}}/>
        </div>
      </>
    );
    return null;
  })();

  // Badge summary
  var badges=[GRANU_TITLE[prod]||prod,getPeriodoLabel()];
  if(filterTurno)badges.push('Turno '+filterTurno);
  if(filterAnalista)badges.push(filterAnalista.split(' ')[0]);
  if(prod==='A36'&&filterTipoMuestra.length<2)badges.push(filterTipoMuestra.join('+')||'—');
  badges.push(filtered.length+' registros');

  return(
    <div>
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <h2>Reportes — Calidad</h2>
      </div>

      {/* ── BARRA DE FILTROS ── */}
      <div className="db-filter-row">
        <div className="dff">
          <label>Planta</label>
          <select value={plantaFiltro} onChange={function(e){
            var pl=e.target.value;setPlantaFiltro(pl);
            var lista=PLANTAS_PROD[pl]||[];
            if(lista.length)setProd(lista[0].value);
          }}>
            {Object.keys(PLANTAS_PROD).map(function(pl){return <option key={pl} value={pl}>{pl}</option>;})}
          </select>
        </div>
        <div className="dff">
          <label>Producto</label>
          <select value={prod} onChange={function(e){setProd(e.target.value);}}>
            {(PLANTAS_PROD[plantaFiltro]||[]).map(function(p){return <option key={p.value} value={p.value}>{p.label}</option>;})}
          </select>
        </div>
        <div className="dff">
          <label>Tipo período</label>
          <select value={periodType} onChange={function(e){setPeriodType(e.target.value);}}>
            <option value="week">Semana del año</option>
            <option value="month">Mes del año</option>
            <option value="year">Año completo</option>
            <option value="custom">Personalizado</option>
          </select>
        </div>
        {periodType==='year'
          ?<div className="dff"><label>Año</label>
            <select value={selYear} onChange={function(e){setSelYear(parseInt(e.target.value));}}>
              {[2024,2025,2026,2027].map(function(y){return <option key={y} value={y}>{y}</option>;})}
            </select>
          </div>
          :periodSel
        }
        <div className="dff">
