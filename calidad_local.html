/* ── ESTADISTICAS (solo admin) ──
   Por cada columna del formulario: tendencia, limites de control
   ±1σ/±2σ/±3σ, promedio movil, estadistica y boxplot. */
function statSummary(arr){
  var v=arr.filter(function(x){return x!=null&&!isNaN(x);}).slice().sort(function(a,b){return a-b;});
  var n=v.length;if(!n)return null;
  var mean=v.reduce(function(a,b){return a+b;},0)/n;
  var sd=n>1?Math.sqrt(v.reduce(function(s,x){return s+(x-mean)*(x-mean);},0)/(n-1)):0;
  function q(p){var idx=(n-1)*p,lo=Math.floor(idx),hi=Math.ceil(idx);return v[lo]+(v[hi]-v[lo])*(idx-lo);}
  return{n:n,mean:mean,sd:sd,min:v[0],max:v[n-1],q1:q(0.25),med:q(0.5),q3:q(0.75),cv:mean?sd/mean*100:null};
}
function Boxplot({st,color}){
  if(!st)return null;
  var w=240,h=54,pad=10,my=20;
  var lo=st.min,hi=st.max;if(hi<=lo){hi=lo+1;lo=lo-1;}
  function X(v){return pad+(v-lo)/(hi-lo)*(w-2*pad);}
  var c=color||'#1a5276';
  return(
    <svg width="100%" viewBox={'0 0 '+w+' '+h} style={{maxWidth:w}}>
      <line x1={X(st.min)} y1={my} x2={X(st.q1)} y2={my} stroke="#999" strokeWidth="1"/>
      <line x1={X(st.q3)} y1={my} x2={X(st.max)} y2={my} stroke="#999" strokeWidth="1"/>
      <line x1={X(st.min)} y1={my-6} x2={X(st.min)} y2={my+6} stroke="#999" strokeWidth="1"/>
      <line x1={X(st.max)} y1={my-6} x2={X(st.max)} y2={my+6} stroke="#999" strokeWidth="1"/>
      <rect x={X(st.q1)} y={my-9} width={Math.max(1,X(st.q3)-X(st.q1))} height="18" fill={c+'22'} stroke={c} strokeWidth="1.2"/>
      <line x1={X(st.med)} y1={my-9} x2={X(st.med)} y2={my+9} stroke={c} strokeWidth="2"/>
      <text x={X(st.min)} y={h-4} fontSize="8" fill="#888" textAnchor="middle">{fmt(st.min,2)}</text>
      <text x={X(st.med)} y={h-4} fontSize="8" fill={c} textAnchor="middle" fontWeight="700">{fmt(st.med,2)}</text>
      <text x={X(st.max)} y={h-4} fontSize="8" fill="#888" textAnchor="middle">{fmt(st.max,2)}</text>
    </svg>
  );
}
function EstadisticasScreen({account,onBack}){
  var[records,setRecords]=useState([]);
  var[loading,setLoading]=useState(true);
  var[plantaF,setPlantaF]=useState('Arenas');
  var[prod,setProd]=useState('A36');
  var[desde,setDesde]=useState('');
  var[hasta,setHasta]=useState('');
  var[turno,setTurno]=useState('');
  var[showMA,setShowMA]=useState(false);
  var[maWin,setMaWin]=useState(5);
  var[colSel,setColSel]=useState('__all');
  var[showS1,setShowS1]=useState(true);
  var[showS2,setShowS2]=useState(true);
  var[showS3,setShowS3]=useState(true);
  var chartRefs=useRef({});var chartInsts=useRef({});
  var histRefs=useRef({});var histInsts=useRef({});

  function movAvgLocal(arr,w){
    return arr.map(function(v,i){
      var sl=arr.slice(Math.max(0,i-w+1),i+1).filter(function(x){return x!=null&&!isNaN(x);});
      return sl.length?sl.reduce(function(a,b){return a+b;},0)/sl.length:null;
    });
  }

  useEffect(function(){load();},[]);
  async function load(){
    setLoading(true);
    var cloud=[];try{cloud=await loadEnsayos();}catch(e){console.error(e);}
    var pa=getPending(),pc=getPendingCuarzo();
    var ids=new Set(cloud.map(function(r){return r.ID;}));
    var merged=cloud.concat(pa.filter(function(r){return !ids.has(r.id);}))
                    .concat(pc.filter(function(r){return !ids.has(r.id);}));
    merged.sort(function(a,b){return(a.FechaMuestreo||a.fecha||'').localeCompare(b.FechaMuestreo||b.fecha||'');});
    setRecords(merged);setLoading(false);
  }

  var filtered=useMemo(function(){
    return records.filter(function(r){
      var pk=r.ProductoKey||r.producto||'';
      if(pk!==prod)return false;
      var f=r.FechaMuestreo||r.fecha||'';
      if(desde&&f<desde)return false;
      if(hasta&&f>hasta)return false;
      if(turno&&(r.Turno||r.turno)!==turno)return false;
      return true;
    });
  },[records,prod,desde,hasta,turno]);

  var enriched=useMemo(function(){
    return filtered.map(function(r){
      var pf=r.PesoFinal!==undefined?r.PesoFinal:r.pesoFinal;
      var rec=Object.assign({},r);
      rec._rp=rpMapTurco(prod,r.granu||[],pf);
      if(prod.indexOf('TT_')===0)rec._inds=turcoIndicadores({producto:prod,granu:r.granu,quimica:r.quimica,extra:r.Extra||r.extra,PesoFinal:pf})||[];
      return rec;
    });
  },[filtered,prod]);

  var columns=useMemo(function(){
    var cols=[];
    var sieves=SIEVE_CONFIG[prod]||[];
    var isCount=(prod==='CGRANOS'||prod==='TT_GRANOS');
    sieves.forEach(function(s,idx){
      cols.push({key:'s_'+s.us,label:(isCount?'Conteo ':'Ret.Parcial ')+s.us,
        get:isCount?function(rec){return parseDecimal((rec.granu||[])[idx]);}
                   :function(rec){return rec._rp?rec._rp[s.us]:null;}});
    });
    var cfg=PRODUCT_CONFIG[prod]||{};
    if(cfg.quimica){
      [['sio2','SiO₂'],['al2o3','Al₂O₃'],['fe2o3','Fe₂O₃'],['cao','CaO'],['mgo','MgO'],['k2o','K₂O'],['na2o','Na₂O'],['tio2','TiO₂']].forEach(function(o){
        cols.push({key:'q_'+o[0],label:o[1]+' (%)',color:'#117864',
          get:function(rec){var q=rec.quimica||{};return parseDecimal(q[o[0]]);}});
      });
    }
    if(cfg.humedad)cols.push({key:'hum',label:'Humedad (%)',color:'#8e44ad',
      get:function(rec){return parseDecimal(rec.PctHumedad!==undefined?rec.PctHumedad:rec.pctHumedad);}});
    if(prod.indexOf('TT_')===0){
      var defs=turcoIndicadores({producto:prod,granu:[],quimica:{},extra:{},PesoFinal:0})||[];
      defs.forEach(function(ind){
        var lim=turcoCtrlLims(ind);
        cols.push({key:'i_'+ind.label,label:'Indicador: '+ind.label,color:'#c0392b',limMin:lim.limMin,limMax:lim.limMax,
          get:function(rec){var arr=rec._inds||[];var f=arr.find(function(x){return x.label===ind.label;});return f&&f.valor!=null?f.valor:null;}});
      });
    }
    return cols;
  },[prod]);

  var colStats=useMemo(function(){
    return columns.map(function(c){
      var series=enriched.map(c.get);
      var st=statSummary(series);
      var vals=series.filter(function(v){return v!=null&&!isNaN(v);});
      // Rango movil y sigma estimada I-mR (correcto para mediciones individuales)
      var mr=[];for(var k=1;k<vals.length;k++)mr.push(Math.abs(vals[k]-vals[k-1]));
      var mrBar=mr.length?mr.reduce(function(a,b){return a+b;},0)/mr.length:0;
      var sigmaHat=mrBar/1.128; // d2 para n=2
      var sig=(sigmaHat>0)?sigmaHat:(st?st.sd:0);
      var out3=0,out2=0,outEett=0,maxRun=vals.length?1:0,curUp=1,curDn=1;
      if(st&&sig){
        vals.forEach(function(v){var z=Math.abs((v-st.mean)/sig);if(z>3)out3++;else if(z>2)out2++;});
        for(var i=1;i<vals.length;i++){
          if(vals[i]>vals[i-1]){curUp++;curDn=1;}
          else if(vals[i]<vals[i-1]){curDn++;curUp=1;}
          else {curUp=1;curDn=1;}
          maxRun=Math.max(maxRun,curUp,curDn);
        }
      }
      if(c.limMin!=null||c.limMax!=null){
        vals.forEach(function(v){if((c.limMin!=null&&v<c.limMin)||(c.limMax!=null&&v>c.limMax))outEett++;});
      }
      return Object.assign({},c,{series:series,st:st,ma:movAvgLocal(series,maWin),
        out3:out3,out2:out2,outEett:outEett,maxRun:maxRun,sig:sig,nLow:st?st.n<20:false});
    });
  },[columns,enriched,maWin]);

  var lbls=useMemo(function(){return filtered.map(function(r){var f=r.FechaMuestreo||r.fecha||'';return f.slice(5);});},[filtered]);

  useEffect(function(){
    if(!window.Chart)return;
    Object.keys(chartInsts.current).forEach(function(k){if(chartInsts.current[k]){chartInsts.current[k].destroy();chartInsts.current[k]=null;}});
    colStats.forEach(function(c){
      var el=chartRefs.current[c.key];if(!el||!c.st)return;
      var m=c.st.mean,sd=c.sig||c.st.sd,col=c.color||'#1a5276';
      function band(v){return c.series.map(function(){return v;});}
      // Marcar en rojo los puntos fuera de control (±3σ I-mR)
      var ptCol=c.series.map(function(v){return(v!=null&&sd&&Math.abs(v-m)>3*sd)?'#c62828':col;});
      var ptRad=c.series.map(function(v){return(v!=null&&sd&&Math.abs(v-m)>3*sd)?5:3;});
      var ds=[{label:c.label,data:c.series.map(function(v){return v!=null?+v.toFixed(3):null;}),
        borderColor:col,backgroundColor:'transparent',borderWidth:1.6,pointRadius:ptRad,pointBackgroundColor:ptCol,tension:.3,spanGaps:true}];
      if(showMA)ds.push({label:'MA'+maWin,data:c.ma.map(function(v){return v!=null?+v.toFixed(3):null;}),borderColor:'#e67e22',borderWidth:2,pointRadius:0,tension:.4,spanGaps:true,borderDash:[4,2]});
      ds.push({label:'Media',data:band(m),borderColor:'#555',borderWidth:1.3,pointRadius:0,borderDash:[2,2]});
      if(showS1){
        ds.push({label:'+1σ',data:band(m+sd),borderColor:'#2e7d32',borderWidth:1,pointRadius:0,borderDash:[3,3]});
        ds.push({label:'-1σ',data:band(m-sd),borderColor:'#2e7d32',borderWidth:1,pointRadius:0,borderDash:[3,3]});
      }
      if(showS2){
        ds.push({label:'+2σ',data:band(m+2*sd),borderColor:'#f9a825',borderWidth:1,pointRadius:0,borderDash:[4,3]});
        ds.push({label:'-2σ',data:band(m-2*sd),borderColor:'#f9a825',borderWidth:1,pointRadius:0,borderDash:[4,3]});
      }
      if(showS3){
        ds.push({label:'LCS (+3σ)',data:band(m+3*sd),borderColor:'#c62828',borderWidth:1.4,pointRadius:0,borderDash:[5,3]});
        ds.push({label:'LCI (-3σ)',data:band(m-3*sd),borderColor:'#c62828',borderWidth:1.4,pointRadius:0,borderDash:[5,3]});
      }
      if(c.limMax!=null)ds.push({label:'EETT máx',data:band(c.limMax),borderColor:'#000',borderWidth:1.3,pointRadius:0});
      if(c.limMin!=null)ds.push({label:'EETT mín',data:band(c.limMin),borderColor:'#000',borderWidth:1.3,pointRadius:0});
      chartInsts.current[c.key]=new window.Chart(el,{type:'line',data:{labels:lbls,datasets:ds},
        options:{animation:{duration:0},responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{font:{size:7},maxRotation:45,maxTicksLimit:10}},y:{ticks:{font:{size:8}}}}}});
    });
    return function(){Object.keys(chartInsts.current).forEach(function(k){if(chartInsts.current[k]){chartInsts.current[k].destroy();chartInsts.current[k]=null;}});};
  },[colStats,lbls,showMA,maWin,colSel,showS1,showS2,showS3]);

  // === Histograma de distribucion por columna ===
  useEffect(function(){
    if(!window.Chart)return;
    Object.keys(histInsts.current).forEach(function(k){if(histInsts.current[k]){histInsts.current[k].destroy();histInsts.current[k]=null;}});
    colStats.forEach(function(c){
      var el=histRefs.current[c.key];if(!el||!c.st||c.st.n<2)return;
      var vals=c.series.filter(function(v){return v!=null&&!isNaN(v);});
      var lo=c.st.min,hi=c.st.max;if(hi<=lo){hi=lo+1;}
      var nb=Math.min(12,Math.max(5,Math.ceil(Math.sqrt(vals.length))));
      var w=(hi-lo)/nb,bins=new Array(nb).fill(0),labels=[];
      for(var b=0;b<nb;b++)labels.push(fmt(lo+w*b,2));
      vals.forEach(function(v){var idx=Math.min(nb-1,Math.floor((v-lo)/w));bins[idx]++;});
      histInsts.current[c.key]=new window.Chart(el,{type:'bar',
        data:{labels:labels,datasets:[{data:bins,backgroundColor:(c.color||'#1a5276')+'cc',borderColor:c.color||'#1a5276',borderWidth:1}]},
        options:{animation:{duration:0},responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{font:{size:7},maxRotation:45,maxTicksLimit:8}},y:{ticks:{font:{size:8}},beginAtZero:true}}}});
    });
    return function(){Object.keys(histInsts.current).forEach(function(k){if(histInsts.current[k]){histInsts.current[k].destroy();histInsts.current[k]=null;}});};
  },[colStats,colSel]);

  return(
    <div>
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <div><h2>Análisis Estadístico</h2>
          <div style={{fontSize:'.82rem',color:'var(--text-secondary)'}}>Control estadístico por columna — solo administrador</div>
        </div>
      </div>

      <div className="db-filter-row">
        <div className="dff"><label>Planta</label>
          <select value={plantaF} onChange={function(e){var pl=e.target.value;setPlantaF(pl);var l=PLANTAS_PROD[pl]||[];if(l.length)setProd(l[0].value);}}>
            {Object.keys(PLANTAS_PROD).map(function(pl){return <option key={pl} value={pl}>{pl}</option>;})}
          </select>
        </div>
        <div className="dff"><label>Producto</label>
          <select value={prod} onChange={function(e){setProd(e.target.value);setColSel('__all');}}>
            {(PLANTAS_PROD[plantaF]||[]).map(function(p){return <option key={p.value} value={p.value}>{p.label}</option>;})}
          </select>
        </div>
        <div className="dff"><label>Columna</label>
          <select value={colSel} onChange={function(e){setColSel(e.target.value);}}>
            <option value="__all">Todas las columnas</option>
            {columns.map(function(c){return <option key={c.key} value={c.key}>{c.label}</option>;})}
          </select>
        </div>
        <div className="dff"><label>Desde</label><input type="date" value={desde} onChange={function(e){setDesde(e.target.value);}}/></div>
        <div className="dff"><label>Hasta</label><input type="date" value={hasta} onChange={function(e){setHasta(e.target.value);}}/></div>
        <div className="dff"><label>Turno</label>
          <select value={turno} onChange={function(e){setTurno(e.target.value);}}>
            <option value="">Todos</option><option value="A">A</option><option value="B">B</option><option value="C">C</option>
          </select>
        </div>
        <div className="dff"><label>Promedio móvil</label>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <label style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:'.8rem'}}>
              <input type="checkbox" checked={showMA} onChange={function(e){setShowMA(e.target.checked);}}/>Ver
            </label>
            <select value={maWin} onChange={function(e){setMaWin(parseInt(e.target.value));}}>
              <option value="5">5</option><option value="7">7</option><option value="10">10</option><option value="30">30</option>
            </select>
          </div>
        </div>
        <div className="dff"><label>Líneas de control σ</label>
          <div style={{display:'flex',gap:8,alignItems:'center',minHeight:34}}>
            <label style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:'.8rem',color:'#2e7d32',fontWeight:600}}>
              <input type="checkbox" checked={showS1} onChange={function(e){setShowS1(e.target.checked);}}/>±1σ
            </label>
            <label style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:'.8rem',color:'#b7791f',fontWeight:600}}>
              <input type="checkbox" checked={showS2} onChange={function(e){setShowS2(e.target.checked);}}/>±2σ
            </label>
            <label style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:'.8rem',color:'#c62828',fontWeight:600}}>
              <input type="checkbox" checked={showS3} onChange={function(e){setShowS3(e.target.checked);}}/>±3σ
            </label>
          </div>
        </div>
      </div>

      {loading&&<div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spinner"/></div>}
      {!loading&&filtered.length===0&&(
        <div style={{textAlign:'center',padding:32,color:'var(--text-muted)',background:'var(--card)',borderRadius:'var(--radius)',boxShadow:'var(--shadow)'}}>
          Sin registros para {GRANU_TITLE[prod]||prod} en el período
        </div>
      )}
      {!loading&&filtered.length>0&&(
        <>
          <div style={{fontSize:'.82rem',color:'var(--text-secondary)',marginBottom:12}}>
            <strong>{GRANU_TITLE[prod]||prod}</strong> · {filtered.length} ensayos · carta de individuales I-mR · límites ±1σ (verde) ±2σ (ámbar) ±3σ/LCS-LCI (rojo) · σ estimada del rango móvil · 🔴 puntos fuera de control
          </div>

          {/* Overview: resumen de todas las columnas de un vistazo */}
          {colSel==='__all'&&(
            <div className="sec-card" style={{marginBottom:16}}>
              <div className="sec-card-hdr" style={{fontSize:'.8rem'}}>Resumen general de columnas — clic en una para analizarla</div>
              <div style={{padding:'6px',overflowX:'auto'}}>
                <table style={{borderCollapse:'collapse',fontSize:'.74rem',width:'100%'}}>
                  <thead><tr style={{background:'#f0f4f8'}}>
                    {['Columna','n','Media','σ','CV%','Tendencia','Fuera ±2σ','Fuera ±3σ','Fuera EETT','Cpk'].map(function(h){return <th key={h} style={{padding:'5px 8px',textAlign:h==='Columna'?'left':'center',color:'#555',whiteSpace:'nowrap'}}>{h}</th>;})}
                  </tr></thead>
                  <tbody>
                    {colStats.map(function(c){
                      if(!c.st)return null;var st=c.st;
                      var cvc=st.cv==null?'inherit':st.cv<10?'#1e7e44':st.cv<20?'#9a6b00':'#922b21';
                      var cpk=null;
                      if((c.limMin!=null||c.limMax!=null)&&c.sig){
                        var cpu=c.limMax!=null?(c.limMax-st.mean)/(3*c.sig):null;
                        var cpl=c.limMin!=null?(st.mean-c.limMin)/(3*c.sig):null;
                        cpk=Math.min.apply(null,[cpu,cpl].filter(function(x){return x!=null;}));
                      }
                      var cpkc=cpk==null?'inherit':cpk>=1.33?'#1e7e44':cpk>=1?'#9a6b00':'#922b21';
                      function cell(val,warn,col){return <td style={{padding:'4px 8px',textAlign:'center',fontWeight:warn?800:400,
                        background:warn?(col||'#922b21')+'18':'',color:warn?(col||'#922b21'):'inherit'}}>{val}</td>;}
                      return(
                        <tr key={c.key} style={{borderBottom:'1px solid #f0f0f0',cursor:'pointer'}}
                          onClick={function(){setColSel(c.key);}}
                          title="Ver análisis detallado de esta columna">
                          <td style={{padding:'4px 8px',fontWeight:600,whiteSpace:'nowrap'}}>{c.label}{c.nLow?' ⚠':''}</td>
                          <td style={{padding:'4px 8px',textAlign:'center'}}>{st.n}</td>
                          <td style={{padding:'4px 8px',textAlign:'center'}}>{fmt(st.mean,2)}</td>
                          <td style={{padding:'4px 8px',textAlign:'center'}}>{fmt(c.sig||st.sd,3)}</td>
                          <td style={{padding:'4px 8px',textAlign:'center',color:cvc,fontWeight:700}}>{st.cv==null?'—':fmt(st.cv,1)}</td>
                          {cell(c.maxRun,c.maxRun>=6,'#2980b9')}
                          {cell(c.out2,c.out2>0,'#e67e22')}
                          {cell(c.out3,c.out3>0,'#c62828')}
                          {cell((c.limMin!=null||c.limMax!=null)?c.outEett:'—',c.outEett>0,'#922b21')}
                          <td style={{padding:'4px 8px',textAlign:'center',color:cpkc,fontWeight:700}}>{cpk==null?'—':fmt(cpk,2)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Pareto de incumplimientos EETT */}
          {colSel==='__all'&&(function(){
            var off=colStats.filter(function(c){return(c.limMin!=null||c.limMax!=null)&&c.outEett>0;})
              .sort(function(a,b){return b.outEett-a.outEett;});
            if(!off.length)return null;
            var maxV=off[0].outEett,tot=off.reduce(function(a,c){return a+c.outEett;},0),acc=0;
            return(
              <div className="sec-card" style={{marginBottom:16}}>
                <div className="sec-card-hdr" style={{fontSize:'.8rem'}}>Pareto de incumplimientos EETT — dónde se concentran las desviaciones</div>
                <div style={{padding:'12px 16px'}}>
                  {off.map(function(c){
                    acc+=c.outEett;var pctAcc=Math.round(acc/tot*100);
                    return(
                      <div key={c.key} style={{display:'flex',alignItems:'center',gap:10,marginBottom:7}}>
                        <div style={{width:160,fontSize:'.76rem',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.label}</div>
                        <div style={{flex:1,background:'#f0f0f0',borderRadius:6,height:20,position:'relative'}}>
                          <div style={{width:(c.outEett/maxV*100)+'%',background:'#c0392b',height:'100%',borderRadius:6}}/>
                        </div>
                        <div style={{width:80,fontSize:'.74rem',textAlign:'right'}}><b style={{color:'#c0392b'}}>{c.outEett}</b> <span style={{color:'var(--text-muted)'}}>({pctAcc}%)</span></div>
                      </div>
                    );
                  })}
                  <div style={{fontSize:'.7rem',color:'var(--text-muted)',marginTop:6}}>Barras = n° de ensayos fuera de EETT por elemento · (%) = acumulado de Pareto. Prioriza los primeros.</div>
                </div>
              </div>
            );
          })()}

          <div style={{display:'grid',gridTemplateColumns:'1fr',gap:16}}>
            {colStats.filter(function(c){return colSel==='__all'||c.key===colSel;}).map(function(c){
              if(!c.st)return null;
              var st=c.st;
              return(
                <div key={c.key} className="sec-card">
                  <div className="sec-card-hdr" style={{fontSize:'.82rem',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <span>{c.label}</span>
                    {c.nLow&&<span style={{fontWeight:600,fontSize:'.68rem',background:'#fff8e1',color:'#9a6b00',border:'1px solid #f6e05e',borderRadius:12,padding:'2px 9px'}}>⚠ Muestra pequeña (n={st.n}&lt;20) — interpretar con cautela</span>}
                  </div>
                  <div style={{padding:'12px 14px'}}>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10,fontSize:'.72rem'}}>
                      {[['n',st.n,0,'#1a5276'],['Media',st.mean,3,'#1a5276'],['σ',st.sd,4,'#6c3483'],['Mín',st.min,3,'#117864'],['Q1',st.q1,3,'#117864'],['Mediana',st.med,3,'#117864'],['Q3',st.q3,3,'#117864'],['Máx',st.max,3,'#117864']].map(function(kv,i){
                        return <span key={i} style={{padding:'3px 9px',borderRadius:10,background:kv[3]+'12',border:'1px solid '+kv[3]+'44'}}>
                          <span style={{color:'var(--text-muted)',fontWeight:600}}>{kv[0]}</span>{' '}
                          <span style={{fontWeight:800,color:kv[3]}}>{kv[1]==null?'—':fmt(kv[1],kv[2])}</span></span>;
                      })}
                      {(function(){var cvc=st.cv==null?'#888':st.cv<10?'var(--success)':st.cv<20?'#b7791f':'var(--error)';
                        return <span style={{padding:'3px 9px',borderRadius:10,background:cvc+'18',border:'1px solid '+cvc+'55',fontWeight:800,color:cvc}}>
                          CV {st.cv==null?'—':fmt(st.cv,1)+'%'} {st.cv!=null&&(st.cv<10?'✓':st.cv<20?'~':'⚠')}</span>;})()}
                    </div>
                    {/* Panel de control: tendencia y dispersion */}
                    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
                      {(function(){
                        var items=[
                          {lbl:'Fuera ±3σ (fuera de control)',val:c.out3,col:'#c62828',warn:c.out3>0},
                          {lbl:'Dispersión alta (±2σ)',val:c.out2,col:'#e67e22',warn:c.out2>0},
                          {lbl:'Tendencia máx (racha)',val:c.maxRun,col:'#2980b9',warn:c.maxRun>=6,suf:c.maxRun>=6?' ⚠':''},
                        ];
                        if(c.limMin!=null||c.limMax!=null)items.push({lbl:'Fuera de EETT',val:c.outEett,col:'#922b21',warn:c.outEett>0});
                        return items.map(function(it,i){
                          var on=it.warn;
                          return <div key={i} style={{padding:'6px 12px',borderRadius:10,minWidth:96,
                            background:on?it.col+'18':'#f5f7fa',border:'1px solid '+(on?it.col:'var(--border)')}}>
                            <div style={{fontSize:'1.25rem',fontWeight:800,color:on?it.col:'var(--text-secondary)',lineHeight:1}}>{it.val}{it.suf||''}</div>
                            <div style={{fontSize:'.64rem',color:'var(--text-muted)',marginTop:2}}>{it.lbl}</div>
                          </div>;
                        });
                      })()}
                    </div>
                    {(function(){
                      // Cp/Cpk si hay limites EETT (analisis de capacidad)
                      if((c.limMin==null&&c.limMax==null)||!st.sd)return null;
                      var cp=(c.limMin!=null&&c.limMax!=null)?(c.limMax-c.limMin)/(6*st.sd):null;
                      var cpu=c.limMax!=null?(c.limMax-st.mean)/(3*st.sd):null;
                      var cpl=c.limMin!=null?(st.mean-c.limMin)/(3*st.sd):null;
                      var cpk=Math.min.apply(null,[cpu,cpl].filter(function(x){return x!=null;}));
                      var cpkCol=cpk>=1.33?'var(--success)':cpk>=1?'#b7791f':'var(--error)';
                      return(
                        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10,fontSize:'.74rem'}}>
                          <span style={{padding:'3px 10px',borderRadius:10,background:'#eef4fb',border:'1px solid var(--primary-light)'}}>
                            <b>Capacidad:</b> {cp!=null?'Cp '+fmt(cp,2)+' · ':''}<span style={{color:cpkCol,fontWeight:800}}>Cpk {fmt(cpk,2)}</span>
                            {cpk>=1.33?' (capaz)':cpk>=1?' (marginal)':' (no capaz)'}
                          </span>
                        </div>
                      );
                    })()}
                    <div style={{display:'grid',gridTemplateColumns:'1fr',gap:14}}>
                      <div>
                        <div style={{fontSize:'.7rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>CARTA DE CONTROL (TENDENCIA + σ)</div>
                        <div style={{position:'relative',minHeight:200}}><canvas ref={function(el){chartRefs.current[c.key]=el;}}/></div>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                        <div>
                          <div style={{fontSize:'.7rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>HISTOGRAMA (DISTRIBUCIÓN)</div>
                          <div style={{position:'relative',minHeight:160}}><canvas ref={function(el){histRefs.current[c.key]=el;}}/></div>
                        </div>
                        <div>
                          <div style={{fontSize:'.7rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>BOXPLOT (MÍN–Q1–MED–Q3–MÁX)</div>
                          <Boxplot st={st} color={c.color}/>
                        </div>
                      </div>
                    </div>
                    {/* Comparacion por turno y analista (solo al enfocar una columna) */}
                    {colSel===c.key&&(function(){
                      function grupos(campo){
                        var g={};
                        enriched.forEach(function(rec){
                          var key=(rec[campo]||rec[campo.toLowerCase()]||'(sin)');
                          var v=c.get(rec);if(v==null||isNaN(v))return;
                          (g[key]||(g[key]=[])).push(v);
                        });
                        return Object.keys(g).sort().map(function(k){return{nombre:k,st:statSummary(g[k])};}).filter(function(x){return x.st;});
                      }
                      function bloque(titulo,arr){
                        if(arr.length<2)return null;
                        return(
                          <div style={{flex:1,minWidth:240}}>
                            <div style={{fontSize:'.7rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:6}}>{titulo}</div>
                            {arr.map(function(gp,i){
                              return(
                                <div key={i} style={{marginBottom:8}}>
                                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',marginBottom:2}}>
                                    <span style={{fontWeight:600}}>{gp.nombre}</span>
                                    <span style={{color:'var(--text-muted)'}}>x̄ {fmt(gp.st.mean,2)} · σ {fmt(gp.st.sd,2)} · n{gp.st.n}</span>
                                  </div>
                                  <Boxplot st={gp.st} color={c.color}/>
                                </div>
                              );
                            })}
                          </div>
                        );
                      }
                      var bT=bloque('POR TURNO',grupos('Turno'));
                      var bA=bloque('POR ANALISTA',grupos('Analista'));
                      if(!bT&&!bA)return null;
                      return(
                        <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                          <div style={{fontSize:'.74rem',fontWeight:800,color:'var(--primary)',marginBottom:8}}>COMPARATIVA (detección de sesgos)</div>
                          <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>{bT}{bA}</div>
                        </div>
                      );
                    })()}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

/* ── EDITOR ADMIN DE REGISTRO ── */
function EditEnsayoModal({rec,account,onClose,onSaved}){
  var pk=rec.ProductoKey||rec.producto||'';
  var sieves=SIEVE_CONFIG[pk]||[];
  var cfg=PRODUCT_CONFIG[pk]||{};
  var[fecha,setFecha]=useState(rec.FechaMuestreo||rec.fecha||'');
  var[turno,setTurno]=useState(rec.Turno||rec.turno||'');
  var[analista,setAnalista]=useState(rec.Analista||rec.analista||'');
  var[tipoM,setTipoM]=useState(rec.TipoMuestra||rec.tipoMuestra||'');
  var[numA,setNumA]=useState(rec.NumAcopio||rec.numAcopio||'');
  var[pIni,setPIni]=useState(String(rec.PesoInicial!=null?rec.PesoInicial:''));
  var[pFin,setPFin]=useState(String(rec.PesoFinal!=null?rec.PesoFinal:''));
  var[hum,setHum]=useState(String(rec.PctHumedad!=null?rec.PctHumedad:''));
  var[obs,setObs]=useState(rec.Observaciones||rec.observaciones||'');
  var[granu,setGranu]=useState((rec.granu&&Array.isArray(rec.granu)?rec.granu:sieves.map(function(){return'';})).map(String));
  var q0=rec.quimica||{};
  var[quim,setQuim]=useState({sio2:String(q0.sio2||''),al2o3:String(q0.al2o3||''),fe2o3:String(q0.fe2o3||''),
    cao:String(q0.cao||''),mgo:String(q0.mgo||''),k2o:String(q0.k2o||''),na2o:String(q0.na2o||''),tio2:String(q0.tio2||'')});
  var[saving,setSaving]=useState(false);
  var[err,setErr]=useState('');

  function upG(i,v){setGranu(function(p){var n=p.slice();n[i]=v;return n;});}
  function upQ(k,v){setQuim(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  async function save(){
    setSaving(true);setErr('');
    var fields={
      fecha_muestreo:fecha||null,turno:turno||null,analista:analista||null,
      tipo_muestra:tipoM||null,num_acopio:numA||null,
      peso_inicial:parseDecimal(pIni)||null,peso_final:parseDecimal(pFin)||null,
      pct_humedad:parseDecimal(hum)||null,observaciones:obs||null,
      granu:granu,quimica:quim,
    };
    try{
      await updateEnsayo(rec.ID||rec.id,fields,account);
      setSaving(false);onSaved();
    }catch(e){setSaving(false);setErr('Error al guardar: '+(e.message||e));}
  }
  var inS={width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif',fontSize:'.85rem'};
  var lbS={fontSize:'.72rem',fontWeight:700,color:'var(--text-secondary)',display:'block',marginBottom:3};
  return(
    <div className="rmodal-ov" onClick={onClose}>
      <div className="rmodal-wrap" style={{maxWidth:640}} onClick={function(e){e.stopPropagation();}}>
        <div className="rmodal-bar">
          <div className="rmodal-bar-title">✏️ Editar registro {rec.Folio?'#'+rec.Folio:''} — {rec.Producto||rec.productoLabel}</div>
          <button className="back-btn" onClick={onClose}>✕</button>
        </div>
        <div style={{padding:'16px 18px',maxHeight:'70vh',overflowY:'auto'}}>
          {err&&<div className="err-box" style={{marginBottom:10}}>{err}</div>}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            <div><label style={lbS}>Fecha muestreo</label><input type="date" style={inS} value={fecha} onChange={function(e){setFecha(e.target.value);}}/></div>
            <div><label style={lbS}>Turno</label>
              <select style={inS} value={turno} onChange={function(e){setTurno(e.target.value);}}>
                <option value="">—</option><option value="A">A</option><option value="B">B</option><option value="C">C</option>
              </select></div>
            <div><label style={lbS}>Analista</label><input style={inS} value={analista} onChange={function(e){setAnalista(e.target.value);}}/></div>
            {cfg.tipoMuestra&&<div><label style={lbS}>Tipo muestra</label>
              <select style={inS} value={tipoM} onChange={function(e){setTipoM(e.target.value);}}>
                <option value="">—</option><option value="Puntual">Puntual</option><option value="Acopio">Acopio</option>
              </select></div>}
            {cfg.tipoMuestra&&<div><label style={lbS}>N° Acopio</label>
              <select style={inS} value={numA} onChange={function(e){setNumA(e.target.value);}}>
                <option value="">—</option>{ACOPIOS_PRODUCCION.map(function(a){return <option key={a.value} value={a.value}>{a.label}</option>;})}
              </select></div>}
            <div><label style={lbS}>Peso inicial (g)</label><input style={inS} value={pIni} onChange={function(e){setPIni(e.target.value);}}/></div>
            <div><label style={lbS}>Peso final (g)</label><input style={inS} value={pFin} onChange={function(e){setPFin(e.target.value);}}/></div>
            {cfg.humedad&&<div><label style={lbS}>Humedad (%)</label><input style={inS} value={hum} onChange={function(e){setHum(e.target.value);}}/></div>}
          </div>
          {sieves.length>0&&(
            <div style={{marginBottom:12}}>
              <label style={lbS}>Granulometría (masas g)</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:6}}>
                {sieves.map(function(s,i){return(
                  <div key={s.us}>
                    <span style={{fontSize:'.68rem',color:'var(--text-muted)'}}>{s.us}</span>
                    <input style={inS} value={granu[i]||''} onChange={function(e){upG(i,e.target.value);}}/>
                  </div>
                );})}
              </div>
            </div>
          )}
          {cfg.quimica&&(
            <div style={{marginBottom:12}}>
              <label style={lbS}>Química (%)</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:6}}>
                {[['sio2','SiO₂'],['al2o3','Al₂O₃'],['fe2o3','Fe₂O₃'],['cao','CaO'],['mgo','MgO'],['k2o','K₂O'],['na2o','Na₂O'],['tio2','TiO₂']].map(function(o){return(
                  <div key={o[0]}>
                    <span style={{fontSize:'.68rem',color:'var(--text-muted)'}}>{o[1]}</span>
                    <input style={inS} value={quim[o[0]]} onChange={function(e){upQ(o[0],e.target.value);}}/>
                  </div>
                );})}
              </div>
            </div>
          )}
          <div><label style={lbS}>Observaciones</label><textarea style={Object.assign({},inS,{minHeight:50})} value={obs} onChange={function(e){setObs(e.target.value);}}/></div>
        </div>
        <div className="rmodal-ctrl">
          <button className="btn btn-secondary" onClick={onClose} disabled={saving}>Cancelar</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Guardando...':'Guardar cambios'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── HISTORY SCREEN ── */
function HistoryScreen({account,onBack}){
  var[records,setRecords]=useState([]);
  var[loading,setLoading]=useState(true);
  var[isAdmin,setIsAdmin]=useState(false);
  var[showPass,setShowPass]=useState(false);
  var[toast,setToast]=useState(null);
  var[expandedId,setExpandedId]=useState(null);
  var[resendSt,setResendSt]=useState({});
  var[reportView,setReportView]=useState(null);
  var[editRec,setEditRec]=useState(null);
  var[certRec,setCertRec]=useState(null);
  var[page,setPage]=useState(0);
  var[busca,setBusca]=useState('');
  var[fDesde,setFDesde]=useState('');
  var[fHasta,setFHasta]=useState('');
  var PAGE_SIZE=50;

  useEffect(function(){load();},[]);

  function getPlanta(r){
    var pk=r.ProductoKey||r.producto||'';
    if(pk.indexOf('TT_')===0)return'Turco';
    if(pk==='MPRIMA')return'Cuarzo';
    return CUARZO_PRODUCTS.some(function(p){return p.value===pk;})?'Cuarzo':'Arenas';
  }

  async function load(){
    setLoading(true);setPage(0);
    var cloud=[];
    try{cloud=await loadEnsayos();}catch(e){console.error('History',e);}
    var pendA=getPending().map(function(r){return Object.assign({},r,{status:'pending'});});
    var pendC=getPendingCuarzo().map(function(r){return Object.assign({},r,{status:'pending'});});
    var cids=new Set(cloud.map(function(r){return r.ID;}));
    var merged=cloud
      .concat(pendA.filter(function(r){return !cids.has(r.id);}))
      .concat(pendC.filter(function(r){return !cids.has(r.id);}));
    merged.sort(function(a,b){return(b.FechaMuestreo||b.fecha||'').localeCompare(a.FechaMuestreo||a.fecha||'');});
    setRecords(merged);
    setLoading(false);
  }

  function reconstruirRegistro(r){
    var prodLabel=r.Producto||r.productoLabel||'';
    var prod=r.ProductoKey||r.producto||'A36';
    if(!SIEVE_CONFIG[prod]){
      if(prodLabel.includes('A38')||prodLabel.includes('Fierrillo'))prod='A38';
      else if(prodLabel.toLowerCase().includes('alim'))prod='ALIM';
      else prod='A36';
    }
    var sieves=SIEVE_CONFIG[prod]||[];
    var gv;
    if(r.granu&&Array.isArray(r.granu)){
      gv=r.granu;
    }else{
      gv=sieves.map(function(s){return String(r[s.us+'_'+s.mm+'g']||0);});
    }
    var pesoFinal=String(r.PesoFinal!==undefined?r.PesoFinal:r.pesoFinal!==undefined?r.pesoFinal:0);
    var gc=calcGranu(prod,gv,pesoFinal);
    var quimica;
    if(r.quimica&&typeof r.quimica==='object'){
      quimica=r.quimica;
    }else{
      quimica={
        sio2:String(r.SiO2||0),al2o3:String(r.Al2O3||0),fe2o3:String(r.Fe2O3||0),
        cao:String(r.CaO||0),mgo:String(r.MgO||0),k2o:String(r.K2O||0),
        na2o:String(r.Na2O||0),tio2:String(r.TiO2||0),
      };
    }
    var data={
      id:r.ID||r.id,
      fecha:r.FechaMuestreo||r.fecha||'',
      fechaEnvio:r.FechaEnvio||r.fechaEnvio||'',
      horaEnvio:r.HoraEnvio||r.horaEnvio||'',
      turno:r.Turno||r.turno||'',
      analista:r.Analista||r.analista||'',
      producto:prod,productoLabel:prodLabel,
      pesoInicial:String(r.PesoInicial!==undefined?r.PesoInicial:r.pesoInicial!==undefined?r.pesoInicial:0),
      pesoFinal:pesoFinal,granu:gv,pesoFondo:gc.fondPeso,
      pctHumedad:String(r.PctHumedad!==undefined?r.PctHumedad:r.pctHumedad!==undefined?r.pctHumedad:0),
      quimica:quimica,
      observaciones:r.Observaciones||r.observaciones||'',
      guia:r.Guia||r.guia||'',lote:r.Lote||r.lote||'',horaSalida:r.HoraSalida||r.horaSalida||'',
    };
    return{data:data,gc:gc};
  }

  async function resend(r){
    var rid=r.ID||r.id;
    setResendSt(function(p){return Object.assign({},p,{[rid]:{loading:true,error:null,ok:false}});});
    var isCuarzo=getPlanta(r)==='Cuarzo';
    try{
      await sendToSupabase(r,account);
      if(isCuarzo)delPendingCuarzo(rid);
      else delPending(rid);
      setResendSt(function(p){return Object.assign({},p,{[rid]:{loading:false,error:null,ok:true}});});
      load();
    }catch(e){
      console.error(e);
      setResendSt(function(p){return Object.assign({},p,{[rid]:{loading:false,error:buildDbError(e),ok:false}});});
    }
  }

  function exportCSV(){
    // Escapar valores para prevenir CSV injection (H-16)
    function esc(v){
      if(v==null)return'';
      var s=String(v);
      // Sanitizar fórmulas: prefijos =, +, -, @ son peligrosos en Excel
      if(s.match(/^[=+\-@]/))s="'"+s;
      // Escapar comillas dobles
      if(s.includes('"')||s.includes(','))s='"'+s.replace(/"/g,'""')+'"';
      return s;
    }
    var hdr=['Folio','ID','Fecha','Hora','Turno','Analista','Planta','Producto','PesoInicial','PesoFinal','Estado'];
    var rows=visibles.map(function(r){
      return[r.Folio||'',r.ID||r.id,r.FechaMuestreo||r.fecha,r.HoraEnvio||r.horaEnvio,r.Turno||r.turno,
        r.Analista||r.analista,getPlanta(r),r.Producto||r.productoLabel,
        r.PesoInicial||r.pesoInicial,r.PesoFinal||r.pesoFinal,
        r.status==='sent'?'Enviado':'Pendiente'].map(esc);
    });
    var csv=[hdr.map(esc)].concat(rows).map(function(row){return row.join(',');}).join('\n');
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
    a.download='historial_calidad.csv';a.click();
  }

  var visibles=useMemo(function(){
    var q=busca.trim().toLowerCase();
    return records.filter(function(r){
      var fecha=r.FechaMuestreo||r.fecha||'';
      if(fDesde&&fecha<fDesde)return false;
      if(fHasta&&fecha>fHasta)return false;
      if(!q)return true;
      var folio=r.Folio?String(r.Folio):'';
      var hay=[folio,'#'+folio,r.Producto||r.productoLabel||'',
        r.Analista||r.analista||'',r.Turno||r.turno||'',getPlanta(r)].join(' ').toLowerCase();
      return hay.indexOf(q)!==-1;
    });
  },[records,busca,fDesde,fHasta]);

  if(reportView){
    return(
      <ReportModal
        data={reportView.data} gc={reportView.gc}
        hideBanner={true}
        onClose={function(){setReportView(null);}}/>
    );
  }

  return(
    <div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
      {showPass&&<PassModal currentUser={account} onOk={function(){setIsAdmin(true);setShowPass(false);}} onCancel={function(){setShowPass(false);}}/>}
      {certRec&&<CertificadoDespacho data={certRec.data} gc={certRec.gc} onClose={function(){setCertRec(null);}}/>}
      {editRec&&<EditEnsayoModal rec={editRec} account={account}
        onClose={function(){setEditRec(null);}}
        onSaved={function(){setEditRec(null);setToast({msg:'Registro actualizado',type:'success'});load();}}/>}
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <h2>Historial — Calidad</h2>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <button className="btn btn-secondary" onClick={exportCSV}>Exportar CSV</button>
        {!isAdmin&&<button className="btn btn-secondary" onClick={function(){setShowPass(true);}}>Modo Admin</button>}
        {isAdmin&&<span className="badge badge-s" style={{padding:'4px 12px'}}>Admin activo</span>}
        <button className="btn btn-secondary" onClick={load} style={{marginLeft:'auto'}}>&#8635; Actualizar</button>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'flex-end',
        background:'var(--card)',padding:'10px 14px',borderRadius:'var(--radius)',boxShadow:'var(--shadow)'}}>
        <div className="field" style={{flex:2,minWidth:180}}>
          <label style={{fontSize:'.72rem'}}>Buscar</label>
          <input type="text" value={busca} placeholder="Folio, producto, analista, planta..."

/* ── EDITOR DE EETT (solo admin) ── */
var EETT_FIELD_LBL={
  retMax:'Ret. máx %',retMin:'Ret. mín %',
  pasMax:'Pasante máx %',pasMin:'Pasante mín %',
  retAcumMax:'Ret.Acum máx %',retAcumMin:'Ret.Acum mín %',
};
function eettToDraft(o){
  if(o===null||o===undefined)return'';
  if(typeof o==='number')return String(o).replace('.',',');
  if(typeof o==='string')return o;
  var r={};Object.keys(o).forEach(function(k){r[k]=eettToDraft(o[k]);});return r;
}
function eettFromDraft(o){
  if(typeof o==='string'){
    var t=o.trim();
    if(t==='')return null;
    var n=parseFloat(t.replace(',','.'));
    return isNaN(n)?o:n;
  }
  var r={};Object.keys(o).forEach(function(k){r[k]=eettFromDraft(o[k]);});return r;
}
function EettEditor({account}){
  var[planta,setPlanta]=useState('Arenas');
  var[sel,setSel]=useState('');
  var[draft,setDraft]=useState(null);
  var[saving,setSaving]=useState(false);
  var[msg,setMsg]=useState(null);

  function pick(k){
    setSel(k);setMsg(null);
    setDraft(k?eettToDraft(EETT_LIVE[k]):null);
  }
  function pickPlanta(p){
    setPlanta(p);
    pick('');
  }
  function setVal(path,value){
    setDraft(function(prev){
      var c=JSON.parse(JSON.stringify(prev));
      var o=c;
      for(var i=0;i<path.length-1;i++)o=o[path[i]];
      o[path[path.length-1]]=value;
      return c;
    });
  }
  async function save(){
    setSaving(true);setMsg(null);
    var clean=eettFromDraft(draft);
    var res=await supabase.from('especificaciones').upsert([{
      producto_key:sel,specs:clean,
      updated_by:account?account.email:'',
      updated_at:new Date().toISOString(),
    }]);
    setSaving(false);
    if(res.error){setMsg({t:'error',m:'Error al guardar: '+res.error.message});}
    else{
      var live=EETT_LIVE[sel];
      Object.keys(clean).forEach(function(k){live[k]=clean[k];});
      setMsg({t:'ok',m:'EETT guardada. Los nuevos limites ya estan activos.'});
    }
  }

  var inputSt={width:90,padding:'5px 7px',borderRadius:5,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif',fontSize:'.8rem'};
  var thSt={textAlign:'left',padding:'4px 8px',fontSize:'.76rem',color:'#777'};
  var tdSt={padding:'3px 8px',fontSize:'.82rem'};

  function renderGranu(g,base){
    return(
      <div style={{overflowX:'auto',marginBottom:12}}>
        <table style={{borderCollapse:'collapse'}}>
          <thead><tr><th style={thSt}>Tamiz</th><th style={thSt}>Limite</th><th style={thSt}>Valor (vacio = sin limite)</th></tr></thead>
          <tbody>
            {Object.keys(g).map(function(us){
              return Object.keys(g[us]).map(function(f){
                return(
                  <tr key={us+f}>
                    <td style={Object.assign({fontWeight:700},tdSt)}>{us}</td>
                    <td style={tdSt}>{EETT_FIELD_LBL[f]||f}</td>
                    <td style={tdSt}>
                      <input style={inputSt} value={g[us][f]}
                        onChange={function(e){setVal(base.concat([us,f]),e.target.value);}}/>
                    </td>
                  </tr>
                );
              });
            })}
          </tbody>
        </table>
      </div>
    );
  }
  function renderQuimica(q,base){
    return(
      <div style={{overflowX:'auto',marginBottom:12}}>
        <table style={{borderCollapse:'collapse'}}>
          <thead><tr><th style={thSt}>Elemento</th><th style={thSt}>Mín %</th><th style={thSt}>Máx %</th></tr></thead>
          <tbody>
            {Object.keys(q).map(function(el){
              return(
                <tr key={el}>
                  <td style={Object.assign({fontWeight:700},tdSt)}>{el.replace('_','+')}</td>
                  <td style={tdSt}><input style={inputSt} value={q[el].min}
                    onChange={function(e){setVal(base.concat([el,'min']),e.target.value);}}/></td>
                  <td style={tdSt}><input style={inputSt} value={q[el].max}
                    onChange={function(e){setVal(base.concat([el,'max']),e.target.value);}}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  }
  function renderSpec(sp,base,titulo){
    return(
      <div key={base.join('.')} style={{marginBottom:18,padding:'12px 14px',background:'#fafafa',borderRadius:8,border:'1px solid var(--border)'}}>
        {titulo&&<div style={{fontWeight:800,fontSize:'.9rem',marginBottom:10,color:'var(--primary)'}}>{titulo}</div>}
        {sp.granulometria&&<>
          <div style={{fontWeight:700,fontSize:'.82rem',marginBottom:6}}>Granulometría</div>
          {renderGranu(sp.granulometria,base.concat(['granulometria']))}
        </>}
        {sp.quimica&&<>
          <div style={{fontWeight:700,fontSize:'.82rem',marginBottom:6}}>Química</div>
          {renderQuimica(sp.quimica,base.concat(['quimica']))}
        </>}
        {sp.d50Max!==undefined&&(
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
            <span style={{fontWeight:700,fontSize:'.82rem'}}>D50 máx (mm):</span>
            <input style={inputSt} value={sp.d50Max}
              onChange={function(e){setVal(base.concat(['d50Max']),e.target.value);}}/>
          </div>
        )}
        {sp.humedad&&(
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontWeight:700,fontSize:'.82rem'}}>Humedad máx (%):</span>
            <input style={inputSt} value={sp.humedad.max}
              onChange={function(e){setVal(base.concat(['humedad','max']),e.target.value);}}/>
          </div>
        )}
      </div>
    );
  }

  var isA36=sel==='A36';
  return(
    <div style={{marginTop:18}}>
      <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:10}}>Especificaciones Técnicas (EETT)</div>
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:12}}>
        <div style={{display:'flex',gap:0,border:'1.5px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
          {['Arenas','Cuarzo','Despachos','Turco'].map(function(pl){
            return(
              <button key={pl} onClick={function(){pickPlanta(pl);}} style={{
                padding:'8px 16px',border:'none',cursor:'pointer',fontFamily:'Inter,sans-serif',
                fontWeight:700,fontSize:'.82rem',
                background:planta===pl?'var(--primary)':'#fff',
                color:planta===pl?'#fff':'var(--text-secondary)',
              }}>{pl}</button>
            );
          })}
        </div>
        <select value={sel} onChange={function(e){pick(e.target.value);}}
          style={{padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif',minWidth:230}}>
          <option value="">— Seleccione producto —</option>
          {EETT_PRODUCTS.filter(function(p){return p.planta===planta;}).map(function(p){
            return <option key={p.key} value={p.key}>{p.label}</option>;
          })}
        </select>
      </div>
      {draft&&(
        <>
          {isA36
            ?Object.keys(draft).map(function(sk){
              return renderSpec(draft[sk],[sk],draft[sk].nombre||sk);
            })
            :renderSpec(draft,[],null)}
          {msg&&<div style={{margin:'8px 0',fontWeight:600,fontSize:'.85rem',color:msg.t==='ok'?'var(--success)':'var(--error)'}}>{msg.m}</div>}
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" disabled={saving} onClick={save}>
              {saving?'Guardando...':'Guardar EETT'}
            </button>
            <button className="btn btn-secondary" disabled={saving} onClick={function(){pick(sel);}}>Descartar cambios</button>
          </div>
          <div style={{fontSize:'.76rem',color:'#999',marginTop:8}}>
            Los cambios afectan alertas, informes y graficos de control. Deja un campo vacio para quitar el limite.
          </div>
        </>
      )}
    </div>
  );
}

    setLoadingAudit(true);
    supabase.from('audit_log').select('*').order('created_at',{ascending:false}).limit(100)
      .then(function(res){setLoadingAudit(false);if(!res.error)setAudit(res.data||[]);
        else setToast({msg:'No se pudo cargar auditoría: '+res.error.message,type:'error'});});
  }

  useEffect(function(){if(isAdmin){fetchAnalistas();fetchAudit();}},[isAdmin]);

  async function delAnalista(id){
    if(!confirm('Eliminar este analista de la lista?'))return;
    var res=await supabase.from('analistas').delete().eq('id',id);
    if(res.error)setToast({msg:'Error: '+res.error.message,type:'error'});
    else{setToast({msg:'Analista eliminado',type:'success'});fetchAnalistas();}
  }
  async function crearUsuario(){
    var em=uEmail.trim().toLowerCase();
    if(!em||!uPass){setUMsg({t:'error',m:'Email y contraseña requeridos.'});return;}
    if(uPass.length<6){setUMsg({t:'error',m:'La contraseña debe tener al menos 6 caracteres.'});return;}
    setULoading(true);setUMsg(null);
    try{
      var res=await supabase.functions.invoke('crear-usuario',{body:{email:em,password:uPass,rol:uRol}});
      if(res.error)throw res.error;
      if(res.data&&res.data.error)throw new Error(res.data.error);
      setUMsg({t:'ok',m:'Usuario '+em+' creado como '+(uRol==='admin'?'administrador':'visualizador')+'.'});
      setUEmail('');setUPass('');
    }catch(e){
      setUMsg({t:'error',m:'No se pudo crear: '+(e.message||e)+'. ¿Desplegaste la función crear-usuario?'});
    }
    setULoading(false);
  }

  async function addAnalista(){
    var n=newAnalista.trim();if(!n)return;
    var row={nombre:n};
    row.planta=newPlanta; // requiere columna planta (supabase-turco-setup.sql)
    var res=await supabase.from('analistas').insert([row]);
    if(res.error&&res.error.message&&res.error.message.indexOf('planta')>=0){
      // columna planta aun no existe: insertar sin ella
      res=await supabase.from('analistas').insert([{nombre:n}]);
    }
    if(res.error){setToast({msg:'Error: '+res.error.message,type:'error'});}
    else{setNewAnalista('');setToast({msg:'Analista agregado',type:'success'});fetchAnalistas();}
  }

  async function toggleAnalista(id,activo){
    await supabase.from('analistas').update({activo:!activo}).eq('id',id);
    fetchAnalistas();
  }

  var totalPending=pendA.length+pendC.length;

  return(
    <div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
      {showPass&&<PassModal currentUser={account} onOk={function(){setIsAdmin(true);setShowPass(false);}} onCancel={function(){setShowPass(false);}}/>}
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <h2>Ajustes</h2>
      </div>

      <SecCard title="Sesion" icon="&#128272;">
        {account
          ?<div>
            <p style={{marginBottom:12}}>Conectado como: <strong>{account.email}</strong></p>
            <button className="btn btn-danger" onClick={onLogout}>Cerrar sesion</button>
          </div>
          :<p>No hay sesion activa.</p>
        }
      </SecCard>

      <SecCard title={'Pendientes locales ('+totalPending+')'} icon="&#128229;">
        <p style={{marginBottom:12,color:'var(--text-secondary)',fontSize:'.88rem'}}>
          Registros guardados localmente sin sincronizar con la base de datos.
        </p>
        {totalPending===0&&<p style={{color:'var(--success)',fontWeight:600}}>&#10003; Sin pendientes</p>}
        {pendA.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:'.82rem',marginBottom:8}}>Arenas ({pendA.length})</div>
            <div style={{overflowX:'auto'}}>
              <table className="htbl">
                <thead><tr><th>Fecha</th><th>Producto</th><th></th></tr></thead>
                <tbody>{pendA.map(function(r){return(
                  <tr key={r.id}>
                    <td>{r.fecha}</td><td>{r.productoLabel}</td>
                    <td><button className="btn btn-danger" style={{padding:'3px 9px',fontSize:'.78rem'}}
                      onClick={function(){delPending(r.id);refresh();}}>Eliminar</button></td>
                  </tr>
                );})}</tbody>
              </table>
            </div>
            <button className="btn btn-danger" style={{marginTop:8}} onClick={function(){
              if(confirm('Eliminar todos los pendientes de Arenas?')){localStorage.removeItem(LS);refresh();
              setToast({msg:'Pendientes Arenas eliminados',type:'success'});}
            }}>Eliminar todos Arenas</button>
          </div>
        )}
        {pendC.length>0&&(
          <div>
            <div style={{fontWeight:700,fontSize:'.82rem',marginBottom:8}}>Cuarzo ({pendC.length})</div>
            <div style={{overflowX:'auto'}}>
              <table className="htbl">
                <thead><tr><th>Fecha</th><th>Producto</th><th></th></tr></thead>
                <tbody>{pendC.map(function(r){return(
                  <tr key={r.id}>
                    <td>{r.fecha}</td><td>{r.productoLabel}</td>
                    <td><button className="btn btn-danger" style={{padding:'3px 9px',fontSize:'.78rem'}}
                      onClick={function(){delPendingCuarzo(r.id);refresh();}}>Eliminar</button></td>
                  </tr>
                );})}</tbody>
              </table>
            </div>
            <button className="btn btn-danger" style={{marginTop:8}} onClick={function(){
              if(confirm('Eliminar todos los pendientes de Cuarzo?')){localStorage.removeItem(LS_CUARZO);refresh();
              setToast({msg:'Pendientes Cuarzo eliminados',type:'success'});}
            }}>Eliminar todos Cuarzo</button>
          </div>
        )}
      </SecCard>

      <SecCard title="Administracion" icon="&#9881;&#65039;">
        {!isAdmin
          ?<button className="btn btn-secondary" onClick={function(){setShowPass(true);}}>Acceder como Admin</button>
          :<div>
            <div style={{marginBottom:14,padding:'8px 12px',background:'var(--success-bg)',borderRadius:'var(--radius-sm)',color:'var(--success)',fontWeight:600}}>
              &#10003; Admin activo
            </div>
            <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:10}}>Gestión de Analistas</div>
            {loadingAn?<div className="spinner"/>:(
              <>
                <div style={{overflowX:'auto',marginBottom:12}}>
                  <table className="htbl">
                    <thead><tr><th>Nombre</th><th>Planta</th><th>Estado</th><th></th></tr></thead>
                    <tbody>{analistas.map(function(a){return(
                      <tr key={a.id}>
                        <td>{a.nombre}</td>
                        <td style={{fontSize:'.8rem',color:'var(--text-secondary)'}}>{a.planta||'Arenas'}</td>
                        <td><span className={'badge '+(a.activo?'badge-s':'badge-w')} style={{fontSize:'.75rem'}}>{a.activo?'Activo':'Inactivo'}</span></td>
                        <td style={{display:'flex',gap:5}}>
                          <button className="btn btn-secondary" style={{padding:'3px 9px',fontSize:'.78rem'}}
                            onClick={function(){toggleAnalista(a.id,a.activo);}}>
                            {a.activo?'Desactivar':'Activar'}
                          </button>
                          <button className="btn btn-danger" style={{padding:'3px 9px',fontSize:'.78rem'}}
                            onClick={function(){delAnalista(a.id);}}>Eliminar</button>
                        </td>
                      </tr>
                    );})}</tbody>
                  </table>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <input type="text" value={newAnalista}
                    onChange={function(e){setNewAnalista(e.target.value);}}
                    onKeyDown={function(e){if(e.key==='Enter')addAnalista();}}
                    placeholder="Nombre del nuevo analista" style={{flex:1,minWidth:180,padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif'}}/>
                  <select value={newPlanta} onChange={function(e){setNewPlanta(e.target.value);}}
                    style={{padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif'}}>
                    <option value="Arenas">Arenas / Cuarzo</option>
                    <option value="Turco">Turco</option>
                  </select>
                  <button className="btn btn-primary" onClick={addAnalista}>Agregar</button>
                </div>
              </>
            )}
            {/* ── Usuarios y accesos ── */}
            <div style={{height:1,background:'var(--border)',margin:'18px 0'}}/>
            <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:10}}>Usuarios y accesos</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr',gap:8,maxWidth:420,marginBottom:8}}>
              <input type="email" value={uEmail} placeholder="correo@migrin.cl"
                onChange={function(e){setUEmail(e.target.value);}}
                style={{padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif'}}/>
              <div style={{display:'flex',gap:8}}>
                <input type="text" value={uPass} placeholder="contraseña temporal"
                  onChange={function(e){setUPass(e.target.value);}}
                  style={{flex:1,padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif'}}/>
                <select value={uRol} onChange={function(e){setURol(e.target.value);}}
                  style={{padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',fontFamily:'Inter,sans-serif'}}>
                  <option value="viewer">Visualizador</option>
                  <option value="admin">Administrador</option>
                </select>
              </div>
              <button className="btn btn-primary" onClick={crearUsuario} disabled={uLoading}>
                {uLoading?'Creando...':'Crear usuario'}
              </button>
              {uMsg&&<div style={{fontSize:'.82rem',fontWeight:600,
                color:uMsg.t==='ok'?'var(--success)':'var(--error)'}}>{uMsg.m}</div>}
            </div>
            <div style={{fontSize:'.74rem',color:'var(--text-muted)',marginBottom:4}}>
              Requiere desplegar la función <strong>crear-usuario</strong> en Supabase (ver supabase-edge-function-usuarios.ts).
              El visualizador solo ve Reportes e Historial. Para cambiar contraseñas o borrar usuarios, usa Supabase → Authentication.
            </div>

            {/* ── Registro de auditoría ── */}
            <div style={{height:1,background:'var(--border)',margin:'18px 0'}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
              <div style={{fontWeight:700,fontSize:'.9rem'}}>Registro de auditoría (últimos 100)</div>
              <button className="btn btn-secondary" style={{padding:'5px 12px',fontSize:'.78rem'}} onClick={fetchAudit}>↻ Actualizar</button>
            </div>
            {loadingAudit?<div className="spinner"/>:(
              audit.length===0
                ?<p style={{color:'var(--text-muted)',fontSize:'.85rem'}}>Sin movimientos registrados.</p>
                :<div style={{overflowX:'auto'}}>
                  <table className="htbl">
                    <thead><tr><th>Fecha</th><th>Acción</th><th>Usuario</th><th>Ensayo</th><th></th></tr></thead>
                    <tbody>{audit.map(function(a){
                      var color=a.accion==='DELETE'?'#c0392b':a.accion==='UPDATE'?'#b7791f':'#1a5276';
                      return(
                        <tr key={a.id}>
                          <td style={{whiteSpace:'nowrap',fontSize:'.78rem'}}>{(a.created_at||'').replace('T',' ').slice(0,16)}</td>
                          <td><span className="badge" style={{background:color+'22',color:color,fontWeight:700,fontSize:'.74rem'}}>{a.accion}</span></td>
                          <td style={{fontSize:'.8rem'}}>{a.usuario||'—'}</td>
                          <td style={{fontSize:'.72rem',color:'var(--text-muted)'}}>{a.ensayo_id||'—'}</td>
                          <td>{a.datos_previos&&<button className="btn btn-secondary" style={{padding:'3px 9px',fontSize:'.74rem'}}
                            onClick={function(){setAuditDetail(a);}}>Ver datos</button>}</td>
                        </tr>
                      );
                    })}</tbody>
                  </table>
                </div>
            )}

            <EettEditor account={account}/>
          </div>
        }
      </SecCard>

      {auditDetail&&(
        <div className="rmodal-ov" onClick={function(){setAuditDetail(null);}}>
          <div className="rmodal-wrap" style={{maxWidth:640}} onClick={function(e){e.stopPropagation();}}>
            <div className="rmodal-bar">
              <div className="rmodal-bar-title">Datos previos — {auditDetail.accion} · {auditDetail.usuario}</div>
              <button className="back-btn" onClick={function(){setAuditDetail(null);}}>✕</button>
            </div>
            <div style={{padding:'16px 18px',maxHeight:'70vh',overflowY:'auto'}}>
              <pre style={{fontSize:'.74rem',whiteSpace:'pre-wrap',wordBreak:'break-word',background:'#f8fafc',padding:12,borderRadius:8}}>
                {JSON.stringify(auditDetail.datos_previos,null,2)}
              </pre>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── HOME SCREEN ── */
const MODULES=[
  {id:'arenas',label:'Arenas',icon:'⏳',desc:'Granulometria, quimica y humedad',active:true},
  {id:'cuarzo',label:'Cuarzo',icon:'💎',desc:'Granulometria, quimica y humedad',active:true},
  {id:'secado-peral',label:'Secado Peral',icon:'♨️',desc:'Control de secado',active:false},
  {id:'lavado-peral',label:'Lavado Peral',icon:'💧',desc:'Control de lavado',active:false},
  {id:'secado-turco',label:'Secado Turco',icon:'♨️',desc:'Control de secado',active:false},
  {id:'lavado-turco',label:'Lavado Turco',icon:'💧',desc:'TLH, minas, cilindro, floculante y mas',active:true},
];

function HomeScreen({onSelect,onNav,isViewer,account}){
  var nombre=account&&account.email?account.email.split('@')[0]:'';
  return(
    <div>
      <div className="home-hero">
        <h2>Bienvenido{nombre?', '+nombre:''}</h2>
        <p>{isViewer
          ?'Tienes acceso de solo lectura. Consulta los reportes y el historial de ensayos.'
          :'Registra un nuevo ensayo o consulta los reportes e historial de calidad.'}</p>
      </div>

      {!isViewer&&(
        <div className="home-block">
          <div className="home-sec-title">📝 Ingresar datos</div>
          <div className="modules-grid">
            {MODULES.map(function(m){
              return(
                <div key={m.id} className={'mod-card '+(m.active?'active':'disabled')}
                  onClick={function(){if(m.active)onSelect(m.id);}}
                  role={m.active?'button':undefined}
                  tabIndex={m.active?0:undefined}
                  onKeyDown={m.active?function(e){if(e.key==='Enter')onSelect(m.id);}:undefined}>
                  {!m.active&&<span className="badge-soon">Proximamente</span>}
                  <div className="mod-icon"><span style={{filter:m.active?'none':'grayscale(1)'}}>{m.icon}</span></div>
                  <div className="mod-label">{m.label}</div>
                  <div className="mod-desc">{m.desc}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="home-block">
        <div className="home-sec-title">📊 Consultar y analizar</div>
        <div className={isViewer?'nav-grid nav-grid-lg':'nav-grid'}>
          <div className={isViewer?'nav-card nav-card-lg':'nav-card'} role="button" tabIndex={0}
            onClick={function(){onNav('dashboard');}}
            onKeyDown={function(e){if(e.key==='Enter')onNav('dashboard');}}>
            <div className="nc-ico" style={{background:'linear-gradient(135deg,#1a5276,#2980b9)'}}>📈</div>
            <div>
              <div className="nc-tit">Reportes</div>
              <div className="nc-desc">Tendencias, cumplimiento EETT, cartas de control y resumen ejecutivo</div>
            </div>
            <div className="nc-arrow">›</div>
          </div>
          <div className={isViewer?'nav-card nav-card-lg':'nav-card'} role="button" tabIndex={0}
            onClick={function(){onNav('history');}}
            onKeyDown={function(e){if(e.key==='Enter')onNav('history');}}>
            <div className="nc-ico" style={{background:'linear-gradient(135deg,#117864,#1abc9c)'}}>📋</div>
            <div>
              <div className="nc-tit">Historial</div>
              <div className="nc-desc">Busca ensayos por folio, producto o fecha y reimprime informes</div>
            </div>
            <div className="nc-arrow">›</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── AUTH SCREEN ── */
function AuthScreen({onLogin}){
  var[email,setEmail]=useState('');
  var[pw,setPw]=useState('');
  var[loading,setLoading]=useState(false);
  var[err,setErr]=useState('');

  async function submit(e){
    e.preventDefault();
    if(!email||!pw){setErr('Ingresa tu email y contraseña.');return;}
    setLoading(true);setErr('');
    var res=await supabase.auth.signInWithPassword({email:email.trim(),password:pw});
    setLoading(false);
    if(res.error){setErr(res.error.message==='Invalid login credentials'?'Email o contraseña incorrectos.':res.error.message);}
    else{onLogin(res.data.user);}
  }

  return(
    <div className="auth-screen">
      <div className="auth-title">Control de Calidad — MIGRIN S.A.</div>
      <div className="auth-sub">Ingresa tus credenciales para acceder al sistema.</div>
      <form onSubmit={submit} style={{width:'100%',maxWidth:320,display:'flex',flexDirection:'column',gap:12,marginTop:8}}>
        <div className="field">
          <label>Email</label>
          <input type="email" value={email} onChange={function(e){setEmail(e.target.value);}}
            placeholder="usuario@migrin.cl" autoComplete="email" autoFocus/>
        </div>
        <div className="field">
          <label>Contraseña</label>
          <input type="password" value={pw} onChange={function(e){setPw(e.target.value);}}
            placeholder="••••••••" autoComplete="current-password"/>
        </div>
        {err&&<p style={{color:'var(--error)',fontSize:'.85rem',margin:0}}>{err}</p>}
        <button type="submit" className="btn btn-primary" disabled={loading} style={{minWidth:220}}>
          {loading?<span className="spinner" style={{width:18,height:18,borderWidth:2,display:'inline-block'}}/>:'Ingresar'}
        </button>
      </form>
    </div>
  );
}

/* ── APP ROOT ── */
function App(){
  var[account,setAccount]=useState(null);
  var[authLoading,setAuthLoading]=useState(true);
  var[screen,setScreen]=useState('home');
  var[toast,setToast]=useState(null);

  var isViewer=account&&account.user_metadata&&account.user_metadata.is_viewer===true&&account.user_metadata.is_admin!==true;
  var isAdmin=account&&account.user_metadata&&account.user_metadata.is_admin===true;

  useEffect(function(){
    // Cargar overrides de EETT desde Supabase
    loadEETT();
    // Recuperar sesion activa al cargar
    supabase.auth.getSession().then(function(res){
      if(res.data&&res.data.session)setAccount(res.data.session.user);
      setAuthLoading(false);
    });
    // Escuchar cambios de sesion
    var sub=supabase.auth.onAuthStateChange(function(_event,session){
      setAccount(session?session.user:null);
    });
    return function(){sub.data&&sub.data.subscription&&sub.data.subscription.unsubscribe();};
  },[]);

  function login(user){setAccount(user);}

  async function logout(){
    await supabase.auth.signOut();
    setAccount(null);setScreen('home');
  }

  function handleSuccess(msg){
    setToast({msg:msg,type:'success'});setScreen('home');
  }

  if(authLoading){
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
        <div className="spinner"/>
      </div>
    );
  }

  var logoUrl='logo.png';

  var header=(
    <header className="app-header">
      <div className="hdr-brand">
        <img src={logoUrl} alt="MIGRIN" style={{height:46,width:46,objectFit:'contain',background:'#fff',borderRadius:10,padding:3}}
          onError={function(e){e.target.style.display='none';}}/>
        <div>
          <div className="hdr-title">Control de Calidad</div>
          <div className="hdr-sub">MIGRIN S.A.</div>
        </div>
      </div>
      {account&&(
        <div className="hdr-actions">
          <button className="btn-hdr" onClick={function(){setScreen('home');}}>
            <span className="lbl">Inicio </span>&#127968;
          </button>
          <button className="btn-hdr" onClick={function(){setScreen('dashboard');}}>
            <span className="lbl">Reportes </span>&#128200;
          </button>
          <button className="btn-hdr" onClick={function(){setScreen('history');}}>
            <span className="lbl">Historial </span>&#128202;
          </button>
          {isAdmin&&(
            <button className="btn-hdr" onClick={function(){setScreen('estadisticas');}}>
              <span className="lbl">Estadísticas </span>&#128201;
            </button>
          )}
          {!isViewer&&(
            <button className="btn-hdr" onClick={function(){setScreen('settings');}}>
              <span className="lbl">Ajustes </span>&#9881;&#65039;
            </button>
          )}
          <button className="btn-hdr" onClick={logout} title="Cerrar sesión">
            <span className="lbl">Salir </span>&#128682;
          </button>
        </div>
      )}
    </header>
  );

  if(!account){
    return(
      <>
        {header}
        <div className="main"><AuthScreen onLogin={login}/></div>
      </>
    );
  }

  return(
    <>
      {header}
      <div className="main">
        {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
        {screen==='home'&&<HomeScreen isViewer={isViewer} account={account}
          onNav={function(s){setScreen(s);}}
          onSelect={function(id){
          if(isViewer)return;
          if(id==='arenas')setScreen('arenas');
          else if(id==='cuarzo')setScreen('cuarzo');
          else if(id==='lavado-turco')setScreen('lavado-turco');
        }}/>}
        {!isViewer&&screen==='arenas'&&<ArenasForm account={account} onBack={function(){setScreen('home');}} onSuccess={handleSuccess}/>}
        {!isViewer&&screen==='cuarzo'&&<CuarzoForm account={account} onBack={function(){setScreen('home');}} onSuccess={handleSuccess}/>}
        {!isViewer&&screen==='lavado-turco'&&<LavadoTurcoScreen account={account} onBack={function(){setScreen('home');}} onSuccess={handleSuccess}/>}
        {screen==='dashboard'&&<DashboardScreen account={account} onBack={function(){setScreen('home');}}/>}
        {screen==='history'&&<HistoryScreen account={account} onBack={function(){setScreen('home');}}/>}
        {isAdmin&&screen==='estadisticas'&&<EstadisticasScreen account={account} onBack={function(){setScreen('home');}}/>}
        {!isViewer&&screen==='settings'&&<SettingsScreen account={account} onBack={function(){setScreen('home');}} onLogout={logout}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(e){console.warn('SW',e);});
  });
}
</script>
</body>
</html>
