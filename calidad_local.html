  if(valor===null||valor===undefined||isNaN(valor))return'info';

function parseDecimal(s){
  if(s===null||s===undefined||s==='')return NaN;
  return parseFloat(String(s).replace(',','.'))||0;
}
function fmt(n,d){
  if(d===undefined)d=2;
  if(n===null||n===undefined||isNaN(n))return'';
  return n.toFixed(d).replace('.',',');
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function today(){return new Date().toISOString().slice(0,10);}
function nowTime(){return new Date().toTimeString().slice(0,5);}

const LS='cq_arenas_pending';
function getPending(){try{return JSON.parse(localStorage.getItem(LS)||'[]');}catch{return[];}}
function savePending(r){localStorage.setItem(LS,JSON.stringify(r));}
function addPending(r){var p=getPending();p.push(r);savePending(p);}
function delPending(id){savePending(getPending().filter(function(r){return r.id!==id;}));}

async function getToken(){
  if(!msalApp)throw new Error('MSAL no inicializado');
  var accs=msalApp.getAllAccounts();
  if(!accs.length)throw new Error('Sin sesion activa');
  try{
    var r=await msalApp.acquireTokenSilent({scopes:SCOPES,account:accs[0]});
    return r.accessToken;
  }catch{
    if(window.innerWidth<=768){await msalApp.acquireTokenRedirect({scopes:SCOPES});return null;}
    var r2=await msalApp.acquireTokenPopup({scopes:SCOPES});
    return r2.accessToken;
  }
}
async function dlXlsx(token,file){
  var url='https://graph.microsoft.com/v1.0/me/drive/root:/'+OD_FOLDER+'/'+file+':/content';
  var r=await fetch(url,{headers:{Authorization:'Bearer '+token}});
  if(r.status===404)return null;
  if(!r.ok)throw new Error('GET '+file+': '+r.status);
  return XLSX.read(await r.arrayBuffer(),{type:'array'});
}
async function ulXlsx(token,file,wb){
  var out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  var blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var url='https://graph.microsoft.com/v1.0/me/drive/root:/'+OD_FOLDER+'/'+file+':/content';
  var r=await fetch(url,{method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':blob.type},body:blob});
  if(!r.ok)throw new Error('PUT '+file+': '+r.status);
}

function buildRow(d,account){
  var sieves=SIEVE_CONFIG[d.producto]||[];
  var row={
    ID:d.id,FechaMuestreo:d.fecha,FechaEnvio:d.fechaEnvio,HoraEnvio:d.horaEnvio,
    Turno:d.turno,Analista:d.analista,Producto:d.productoLabel,
    PesoInicial:parseDecimal(d.pesoInicial),PesoFinal:parseDecimal(d.pesoFinal),
  };
  sieves.forEach(function(s,i){row[s.us+'_'+s.mm+'g']=parseDecimal(d.granu[i]||'')||0;});
  row.PesoFondo=d.pesoFondo;
  row.PctHumedad=parseDecimal(d.pctHumedad);
  row.SiO2=parseDecimal(d.quimica.sio2);
  row.Al2O3=parseDecimal(d.quimica.al2o3);
  row.Fe2O3=parseDecimal(d.quimica.fe2o3);
  row.CaO=parseDecimal(d.quimica.cao);
  row.MgO=parseDecimal(d.quimica.mgo);
  row.K2O=parseDecimal(d.quimica.k2o);
  row.Na2O=parseDecimal(d.quimica.na2o);
  row.TiO2=parseDecimal(d.quimica.tio2);
  row.K2O_Na2O=parseFloat(((parseDecimal(d.quimica.k2o)||0)+(parseDecimal(d.quimica.na2o)||0)).toFixed(2));
  row.Observaciones=d.observaciones;
  row.Timestamp=new Date().toISOString();
  row.EnviadoPor=account?account.username:'';
  return row;
}

async function sendToOD(data,account){
  var token=await getToken();
  if(!token)return;
  var wb=await dlXlsx(token,OD_FILE);
  var row=buildRow(data,account);
  if(!wb){
    wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([row]),'Registros');
  }else{
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws);
    rows.push(row);
    wb.Sheets[wb.SheetNames[0]]=XLSX.utils.json_to_sheet(rows);
  }
  await ulXlsx(token,OD_FILE,wb);
}

function calcGranu(producto,gv,pesoFinalRaw){
  var sieves=SIEVE_CONFIG[producto]||[];
  var pf=parseDecimal(pesoFinalRaw);
  var acum=0;
  var rows=sieves.map(function(s,i){
    var peso=parseDecimal(gv[i]||'')||0;
    var pctP=(!isNaN(pf)&&pf>0)?(peso/pf)*100:0;
    acum+=pctP;
    return{us:s.us,mm:s.mm,peso:peso,pctP:pctP,pctA:acum,pctPas:100-acum};
  });
  var sumPesos=rows.reduce(function(s,r){return s+r.peso;},0);
  var fondPeso=(!isNaN(pf)?pf:0)-sumPesos;
  var fondPctP=(!isNaN(pf)&&pf>0)?(fondPeso/pf)*100:0;
  var fondAcum=acum+fondPctP;
  var fondPas=100-fondAcum;
  rows.push({us:'Fondo',mm:'—',peso:fondPeso,pctP:fondPctP,pctA:fondAcum,pctPas:fondPas,isFondo:true});
  var negative=fondPeso<-0.001;
  var closeOk=!negative&&fondAcum>=99&&fondAcum<=101&&fondPas<=1;
  return{rows:rows,fondPeso:fondPeso,fondAcum:fondAcum,fondPas:fondPas,closeOk:closeOk,negative:negative};
}

function Toast({msg,type,onClose}){
  useEffect(function(){var t=setTimeout(onClose,4200);return function(){clearTimeout(t);};},[]);
  return <div className={'toast toast-'+type}>{msg}</div>;
}

function Field({name,label,hint,type,required,value,onChange,error,readOnly,placeholder,maxLength}){
  if(!type)type='text';
  function handleDecimal(e){e.target.value=e.target.value.replace('.',',');onChange(e);}
  return(
    <div className="field">
      <label htmlFor={name}>{label}{required&&<span className="req">*</span>}</label>
      {type==='textarea'
        ?<textarea id={name} value={value} onChange={onChange} placeholder={placeholder}
            maxLength={maxLength} rows={3} className={error?'err':''}/>
        :<input id={name} type={type==='decimal'?'text':type}
            inputMode={type==='decimal'?'decimal':undefined}
            value={value}
            onChange={type==='decimal'&&!readOnly?handleDecimal:onChange}
            placeholder={placeholder}
            className={(error?'err ':' ')+(readOnly?'f-ro':'')}
            readOnly={readOnly}/>
      }
      {hint&&type!=='decimal'&&!error&&<span className="fhint">{hint}</span>}
      {error&&<span className="ferr">{error}</span>}
    </div>
  );
}

function Sel({name,label,options,value,onChange,error,required}){
  return(
    <div className="field">
      <label htmlFor={name}>{label}{required&&<span className="req">*</span>}</label>
      <select id={name} value={value} onChange={onChange} className={error?'err':''}>

        {options.map(function(o){return <option key={o.value} value={o.value}>{o.label}</option>;})}

      {error&&<span className="ferr">{error}</span>}

  );
}

function GranuTable({producto,pesoFinal,values,onChange}){
  var gc=useMemo(function(){return calcGranu(producto,values,pesoFinal);},[producto,values,pesoFinal]);
  return(
    <div>
      <div className="tbl-wrap">
        <table className="gtbl">
          <thead><tr>
            <th>Tamiz US</th><th>mm</th><th>Peso Ret. (g)</th>
            <th>% Ret. Parcial</th><th>% Ret. Acum.</th><th>% Pasante</th>
          </tr></thead>
          <tbody>
            {gc.rows.map(function(row,i){
              var isFondo=!!row.isFondo;
              var acumCls=isFondo?(gc.closeOk?'c-ok':'c-err'):'c-neu';
              var pasCls=isFondo?(gc.fondPas<=1?'c-ok':'c-err'):'c-neu';
              return(
                <tr key={i}>
                  <td>{row.us}</td>
                  <td style={{color:'var(--text-muted)'}}>{row.mm}</td>
                  <td>
                    {isFondo
                      ?<span style={{color:gc.negative?'var(--error)':'inherit',fontWeight:700}}>{fmt(row.peso)}</span>
                      :<input type="text" inputMode="decimal" value={values[i]||''}
                          onChange={function(e){e.target.value=e.target.value.replace('.',',');onChange(i,e.target.value);}}
                          placeholder="0,00"/>
                    }
                  </td>
                  <td className="c-neu">{fmt(row.pctP)}</td>
                  <td className={acumCls}>{fmt(row.pctA)}</td>
                  <td className={pasCls}>{fmt(row.pctPas)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className={'closure '+(gc.closeOk?'closure-ok':'closure-err')}>
        {gc.negative
          ?'Aviso: Los pesos superan el peso final (Fondo = '+fmt(gc.fondPeso)+' g)'
          :gc.closeOk
            ?'Cierre correcto — Ret. Acum. = '+fmt(gc.fondAcum)+'% | Pasante = '+fmt(gc.fondPas)+'%'
            :'El retenido acumulado cierra en '+fmt(gc.fondAcum)+'% — debe ser 100%. Revise los pesos. | Pasante = '+fmt(gc.fondPas)+'%'
        }
      </div>
    </div>
  );
}

  var fondRow=gc.rows.find(function(r){return r.isFondo;})||null;

  function parseMm(s){return parseFloat(String(s).replace(',','.'))||0;}
  function interp(thr){
    for(var i=0;i<sieveRows.length-1;i++){
      if(sieveRows[i].pctPas>=thr&&sieveRows[i+1].pctPas<thr){
        var m1=parseMm(sieves[i]?sieves[i].mm:0),m2=parseMm(sieves[i+1]?sieves[i+1].mm:0);
        var p1=sieveRows[i].pctPas,p2=sieveRows[i+1].pctPas;
        return p1===p2?m1:m1+(m2-m1)*(p1-thr)/(p1-p2);

    }
    return null;
  }
  var d50=interp(50),p80=interp(80);

  function sv(us,field){
    if(!field)field='pctP';

/* ── ARENAS FORM ── */
function ArenasForm({account,onBack,onSuccess}){
  var[view,setView]=useState('form');
  var[sending,setSending]=useState(false);
  var[reportModal,setReportModal]=useState(null);
  var[fecha,setFecha]=useState(today());
  var[fechaEnvio,setFechaEnvio]=useState('');
  var[horaEnvio,setHoraEnvio]=useState('');
  var[turno,setTurno]=useState('');
  var[analista,setAnalista]=useState('');
  var[producto,setProducto]=useState('');
  var[pesoInicial,setPesoInicial]=useState('');
  var[pesoFinal,setPesoFinal]=useState('');
  var[gv,setGv]=useState([]);
  var[pctHumedad,setPctHumedad]=useState('');
  var[quimica,setQuimica]=useState({sio2:'',al2o3:'',fe2o3:'',cao:'',mgo:'',k2o:'',na2o:'',tio2:''});
  var[obs,setObs]=useState('');
  var[errors,setErrors]=useState({});

  useEffect(function(){
    setGv(Array(SIEVE_CONFIG[producto]?SIEVE_CONFIG[producto].length:0).fill(''));
  },[producto]);

  var gc=useMemo(function(){return calcGranu(producto,gv,pesoFinal);},[producto,gv,pesoFinal]);
  function updGv(i,v){setGv(function(p){var n=p.slice();n[i]=v;return n;});}

  function validate(){
    var e={};
    if(!fecha)e.fecha='Requerido';
    if(!analista)e.analista='Requerido';
    if(!producto)e.producto='Seleccione un producto';
    var pi=parseDecimal(pesoInicial),pf=parseDecimal(pesoFinal);
    if(!pesoInicial)e.pesoInicial='Requerido';
    if(!pesoFinal)e.pesoFinal='Requerido';
    else if(pi>0&&Math.abs(pf-pi)/pi>0.25)
      e.pesoFinal='El peso final difiere mas del 25% del peso inicial. Verifique.';
    if(!pctHumedad)e.pctHumedad='Requerido';
    if(!quimica.sio2)e.sio2='Requerido';
    if(!quimica.al2o3)e.al2o3='Requerido';
    if(!quimica.fe2o3)e.fe2o3='Requerido';
    if(!quimica.cao)e.cao='Requerido';
    if(!quimica.mgo)e.mgo='Requerido';
    if(!quimica.k2o)e.k2o='Requerido';
    if(!quimica.na2o)e.na2o='Requerido';
    if(!quimica.tio2)e.tio2='Requerido';
    if(producto&&!gc.closeOk)
      e.granu='El cierre granulometrico no es correcto (debe ser 100%). Revise los pesos.';
    return e;
  }

  function handleReview(){
    var e=validate();
    if(Object.keys(e).length){setErrors(e);window.scrollTo({top:0,behavior:'smooth'});return;}
    var now=new Date();
    setFechaEnvio(now.toISOString());
    setHoraEnvio(now.toLocaleTimeString('es-CL'));
    setErrors({});setView('review');
  }

  async function handleConfirm(){
    setSending(true);
    var prodObj=PRODUCTS.find(function(p){return p.value===producto;});
    var prodLabel=prodObj?prodObj.label:producto;
    var data={
      id:uid(),fecha:fecha,fechaEnvio:fechaEnvio,horaEnvio:horaEnvio,
      turno:turno,analista:analista,producto:producto,productoLabel:prodLabel,
      pesoInicial:pesoInicial,pesoFinal:pesoFinal,granu:gv,pesoFondo:gc.fondPeso,
      pctHumedad:pctHumedad,quimica:quimica,observaciones:obs,
    };
    var msg='';
    try{
      await sendToOD(data,account);
      msg='Registro enviado exitosamente a OneDrive.';
    }catch(err){
      console.error(err);
      data.status='pending';
      addPending(data);
      msg='Sin conexion a OneDrive. Registro guardado localmente como pendiente.';
    }
    setSending(false);
    setReportModal({data:data,gc:gc,msg:msg});
  }

  if(reportModal){
    return(
      <ReportModal
        data={reportModal.data}
        gc={reportModal.gc}
        onClose={function(){setReportModal(null);onSuccess(reportModal.msg);}}/>
    );
  }

  if(view==='review'){
    return(
      <ReviewScreen
        data={{fecha:fecha,fechaEnvio:fechaEnvio,horaEnvio:horaEnvio,turno:turno,
               analista:analista,producto:producto,pesoInicial:pesoInicial,pesoFinal:pesoFinal,
               pctHumedad:pctHumedad,quimica:quimica,observaciones:obs}}
        gc={gc} onConfirm={handleConfirm} onBack={function(){setView('form');}} sending={sending}/>
    );
  }

  var prodObj=PRODUCTS.find(function(p){return p.value===producto;});
  var prodLabel=prodObj?prodObj.label:null;
  var errList=Object.values(errors);

  return(
    <div>
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <div>
          <h2>Planta Arenas</h2>
          {prodLabel&&<div style={{fontSize:'.82rem',color:'var(--text-secondary)',marginTop:2}}>{prodLabel}</div>}
        </div>
      </div>

      <div className="prod-mosaic">
        {PRODUCTS.map(function(p){
          return(
            <button key={p.value}
              className={'prod-btn'+(producto===p.value?' sel':'')}
              onClick={function(){setProducto(p.value);}}>
              {p.label}
            </button>
          );
        })}
      </div>

      {!producto&&(
        <div className="prod-no-sel">Selecciona un producto para continuar</div>
      )}

      {producto&&(
        <div>
          {errList.length>0&&(
            <div className="err-box">
              <strong>Corrija los siguientes errores:</strong>
              <ul>{errList.map(function(e,i){return <li key={i}>{e}</li>;})}</ul>
            </div>
          )}

          <SecCard title="Informacion General" icon="&#128203;">
            <div className="fg fg-2" style={{marginBottom:14}}>
              <Field name="fecha" label="Fecha de muestreo" type="date" required value={fecha}
                onChange={function(e){setFecha(e.target.value);}} error={errors.fecha}
                hint="Fecha en que se tomo la muestra"/>
              <div className="field">
                <label style={{fontSize:'.82rem',fontWeight:600,color:'var(--text-secondary)'}}>Hora de envio</label>
                <input type="text" value="Se registra automaticamente al confirmar" readOnly className="f-ro"/>
              </div>
            </div>
            <div className="fg fg-2">
              <Sel name="turno" label="Turno" options={TURNOS} value={turno}
                onChange={function(e){setTurno(e.target.value);}} error={errors.turno}/>
              <Sel name="analista" label="Analista" required options={ANALISTAS} value={analista}
                onChange={function(e){setAnalista(e.target.value);}} error={errors.analista}/>
            </div>
          </SecCard>

          <SecCard title="Pesos" icon="&#9878;&#65039;">
            <div className="fg fg-2">
              <Field name="pi" label="Peso Inicial (g)" type="decimal" required value={pesoInicial}
                onChange={function(e){setPesoInicial(e.target.value);}} error={errors.pesoInicial} placeholder="0,00"/>
              <Field name="pf" label="Peso Final (g)" type="decimal" required value={pesoFinal}
                onChange={function(e){setPesoFinal(e.target.value);}} error={errors.pesoFinal} placeholder="0,00"/>
            </div>
          </SecCard>

          <SecCard title={'Granulometria — '+(GRANU_TITLE[producto]||prodLabel)} icon="&#128300;">
            <GranuTable producto={producto} pesoFinal={pesoFinal} values={gv} onChange={updGv}/>
            {errors.granu&&<div style={{color:'var(--error)',fontSize:'.84rem',marginTop:9,fontWeight:600}}>
              Aviso: {errors.granu}
            </div>}
          </SecCard>

          <SecCard title="Humedad" icon="&#128167;">
            <div style={{maxWidth:240}}>
              <Field name="pctHumedad" label="% Humedad" type="decimal" required value={pctHumedad}
                onChange={function(e){setPctHumedad(e.target.value);}} error={errors.pctHumedad} placeholder="0,00"/>
            </div>
          </SecCard>

          <SecCard title="Quimica" icon="&#9879;&#65039;">
            <div className="fg-quim">
              <Field name="sio2" label="SiO₂ (%)" type="decimal" required value={quimica.sio2}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{sio2:e.target.value});});}} error={errors.sio2} placeholder="0,00"/>
              <Field name="al2o3" label="Al₂O₃ (%)" type="decimal" required value={quimica.al2o3}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{al2o3:e.target.value});});}} error={errors.al2o3} placeholder="0,00"/>
              <Field name="fe2o3" label="Fe₂O₃ (%)" type="decimal" required value={quimica.fe2o3}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{fe2o3:e.target.value});});}} error={errors.fe2o3} placeholder="0,00"/>
              <Field name="cao" label="CaO (%)" type="decimal" required value={quimica.cao}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{cao:e.target.value});});}} error={errors.cao} placeholder="0,00"/>
              <Field name="mgo" label="MgO (%)" type="decimal" required value={quimica.mgo}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{mgo:e.target.value});});}} error={errors.mgo} placeholder="0,00"/>
              <Field name="k2o" label="K₂O (%)" type="decimal" required value={quimica.k2o}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{k2o:e.target.value});});}} error={errors.k2o} placeholder="0,00"/>
              <Field name="na2o" label="Na₂O (%)" type="decimal" required value={quimica.na2o}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{na2o:e.target.value});});}} error={errors.na2o} placeholder="0,00"/>
              <Field name="tio2" label="TiO₂ (%)" type="decimal" required value={quimica.tio2}
                onChange={function(e){setQuimica(function(p){return Object.assign({},p,{tio2:e.target.value});});}} error={errors.tio2} placeholder="0,00"/>
              <div className="field">
                <label>K₂O + Na₂O (%)<span className="calc-badge">Calculado</span></label>
                <input type="text" readOnly className="f-ro" placeholder="—"
                  value={(quimica.k2o||quimica.na2o)?fmt((parseDecimal(quimica.k2o)||0)+(parseDecimal(quimica.na2o)||0)):''}/>

          <SecCard title="Observaciones" icon="&#128221;">

          </div>
        </div>
      )}
    </div>
  );
}

/* ── DASHBOARD SCREEN ── */
function DashboardScreen({account,onBack}){
  var[records,setRecords]=useState([]);
  var[loading,setLoading]=useState(true);
  var[tab,setTab]=useState('granu');
  var[prod,setProd]=useState('A36');
  var[period,setPeriod]=useState(30);
  var[filterTurno,setFilterTurno]=useState('');
  var[filterAnalista,setFilterAnalista]=useState('');
  var[maWin,setMaWin]=useState(5);
  var chartGRef=useRef(null);
  var chartQRef=useRef(null);
  var instG=useRef(null);
  var instQ=useRef(null);

  useEffect(function(){loadData();},[]);

  async function loadData(){
    setLoading(true);
    var cloud=[];
    try{
      var token=await getToken();
      if(token){
        var wb=await dlXlsx(token,OD_FILE);
        if(wb){
          var ws=wb.Sheets[wb.SheetNames[0]];
          cloud=XLSX.utils.sheet_to_json(ws);
        }
      }
    }catch(e){console.error(e);}
    var pending=getPending().map(function(r){return Object.assign({},r,{_src:'local'});});
    var ids=new Set(cloud.map(function(r){return r.ID;}));
    var merged=cloud.concat(pending.filter(function(r){return !ids.has(r.id);}));
    merged.sort(function(a,b){
      return(a.FechaMuestreo||a.fecha||'').localeCompare(b.FechaMuestreo||b.fecha||'');
    });
    setRecords(merged);
    setLoading(false);
  }

  var filtered=useMemo(function(){
    var cutoff=new Date(Date.now()-period*86400000).toISOString().slice(0,10);
    return records.filter(function(r){
      var fecha=r.FechaMuestreo||r.fecha||'';
      if(fecha<cutoff)return false;
      var rProd=r.Producto||r.productoLabel||'';
      var prodKey=prod==='A36'?'A36':prod==='A38'?'A38':'Alim';
      if(!rProd.includes(prodKey))return false;
      if(filterTurno&&(r.Turno||r.turno)!==filterTurno)return false;
      if(filterAnalista&&(r.Analista||r.analista)!==filterAnalista)return false;
      return true;
    });
  },[records,prod,period,filterTurno,filterAnalista]);

  function fmtXDate(s){
    if(!s)return'';
    var d=new Date(s+'T12:00:00');
    var mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return(d.getDate())+'/'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+' '+mn[d.getMonth()];
  }

  function movAvg(arr,w){
    return arr.map(function(v,i){
      var sl=arr.slice(Math.max(0,i-w+1),i+1).filter(function(x){return x!==null&&!isNaN(x);});
      return sl.length?sl.reduce(function(a,b){return a+b;},0)/sl.length:null;
    });
  }

  function computeStats(row){
    var sieves=SIEVE_CONFIG[prod]||[];
    var pf=parseDecimal(row.PesoFinal);
    if(!pf||pf<=0)return null;
    var acum=0;
    var stats={};
    sieves.forEach(function(s){
      var key=s.us+'_'+s.mm+'g';
      var peso=parseDecimal(row[key])||0;
      var pctP=(peso/pf)*100;
      acum+=pctP;
      stats[s.us]={pctP:pctP,pctA:acum,pctPas:100-acum};
    });
    function interp2(thr){
      for(var i=0;i<sieves.length-1;i++){
        var s1=stats[sieves[i].us],s2=stats[sieves[i+1].us];
        if(!s1||!s2)continue;
        if(s1.pctPas>=thr&&s2.pctPas<thr){
          var m1=parseFloat(sieves[i].mm.replace(',','.')),m2=parseFloat(sieves[i+1].mm.replace(',','.'));
          var p1=s1.pctPas,p2=s2.pctPas;
          return p1===p2?m1:m1+(m2-m1)*(p1-thr)/(p1-p2);
        }
      }
      return null;
    }
    stats._d50=interp2(50);
    stats._p80=interp2(80);
    return stats;
  }

  var labels=filtered.map(function(r){return fmtXDate(r.FechaMuestreo||r.fecha);});

  var GRANU_CONTROLS=[
    {key:'#35',field:'pctA',label:'Ret.Acum #35',color:'#e53935',limMin:null,limMax:2},
    {key:'#120',field:'pctA',label:'Ret.Acum #120',color:'#1a5276',limMin:86,limMax:null},
    {key:'#170',field:'pctA',label:'Ret.Acum #170',color:'#276749',limMin:95,limMax:null},
    {key:'_d50',field:null,label:'D50 (mm)',color:'#b7791f',limMin:null,limMax:0.290},
    {key:'_p80',field:null,label:'P80 (mm)',color:'#8e44ad',limMin:null,limMax:null},
  ];

  var CHEM_CONTROLS=[
    {key:'SiO2',label:'SiO2 (%)',color:'#1a5276'},
    {key:'Al2O3',label:'Al2O3 (%)',color:'#c53030'},
    {key:'Fe2O3',label:'Fe2O3 (%)',color:'#b7791f'},
  ];

  useEffect(function(){
    if(tab!=='granu'||!chartGRef.current||!window.Chart)return;
    if(instG.current){instG.current.destroy();instG.current=null;}
    var datasets=GRANU_CONTROLS.map(function(ctrl){
      var data=filtered.map(function(r){
        var st=computeStats(r);
        if(!st)return null;
        if(ctrl.field)return st[ctrl.key]?+(st[ctrl.key][ctrl.field]||0).toFixed(2):null;
        return st[ctrl.key]!=null?+st[ctrl.key].toFixed(3):null;
      });
      return{
        label:ctrl.label,data:data,borderColor:ctrl.color,
        backgroundColor:ctrl.color+'22',borderWidth:2,
        pointRadius:3,tension:.3,spanGaps:true,
      };
    });
    instG.current=new window.Chart(chartGRef.current,{
      type:'line',
      data:{labels:labels,datasets:datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{font:{size:10,family:'Inter'}}}},
        scales:{
          x:{ticks:{font:{size:9,family:'Inter'},maxRotation:45}},
          y:{ticks:{font:{size:9,family:'Inter'}}},
        },
      },
    });
    return function(){if(instG.current){instG.current.destroy();instG.current=null;}};
  },[tab,filtered,prod]);

  useEffect(function(){
    if(tab!=='quim'||!chartQRef.current||!window.Chart)return;
    if(instQ.current){instQ.current.destroy();instQ.current=null;}
    var datasets=[];
    CHEM_CONTROLS.forEach(function(ctrl){
      var raw=filtered.map(function(r){
        var v=parseDecimal(r[ctrl.key]);
        return isNaN(v)?null:+v.toFixed(3);
      });
      var ma=movAvg(raw,maWin);
      datasets.push({
        label:ctrl.label,data:raw,borderColor:ctrl.color,
        backgroundColor:'transparent',borderWidth:1.5,
        pointRadius:3,tension:.3,spanGaps:true,borderDash:[],
      });
      datasets.push({
        label:ctrl.label+' MA'+maWin,data:ma,borderColor:ctrl.color,
        backgroundColor:ctrl.color+'33',borderWidth:2.5,
        pointRadius:0,tension:.4,spanGaps:true,fill:false,
        borderDash:[4,2],
      });
    });
    instQ.current=new window.Chart(chartQRef.current,{
      type:'line',
      data:{labels:labels,datasets:datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{font:{size:10,family:'Inter'}}}},
        scales:{
          x:{ticks:{font:{size:9,family:'Inter'},maxRotation:45}},
          y:{ticks:{font:{size:9,family:'Inter'}}},
        },
      },
    });
    return function(){if(instQ.current){instQ.current.destroy();instQ.current=null;}};
  },[tab,filtered,maWin,prod]);

  var kpiStats=useMemo(function(){
    return GRANU_CONTROLS.map(function(ctrl){
      var vals=filtered.map(function(r){
        var st=computeStats(r);
        if(!st)return null;
        if(ctrl.field)return st[ctrl.key]?st[ctrl.key][ctrl.field]:null;
        return st[ctrl.key]!=null?st[ctrl.key]:null;
      }).filter(function(v){return v!==null&&!isNaN(v);});
      if(!vals.length)return Object.assign({},ctrl,{avg:null,last:null,sem:'info'});
      var avg=vals.reduce(function(a,b){return a+b;},0)/vals.length;
      var last=vals[vals.length-1];
      var sem=calcSemaforo(last,ctrl.limMin,ctrl.limMax);
      return Object.assign({},ctrl,{avg:avg,last:last,sem:sem});
    });
  },[filtered,prod]);

  return(
    <div>
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <h2>Reportes — Planta Arenas</h2>
      </div>

      <div className="dash-filter-bar">
        <div className="field" style={{minWidth:120}}>
          <label style={{fontSize:'.78rem',fontWeight:600,color:'var(--text-secondary)'}}>Producto</label>
          <select value={prod} onChange={function(e){setProd(e.target.value);}} style={{fontFamily:'Inter',fontSize:'.85rem',padding:'6px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)'}}>
            <option value="A36">A36 TLH</option>
            <option value="A38">A38 Fierrillo</option>
            <option value="ALIM">Alimentacion</option>
          </select>
        </div>
        <div className="field" style={{minWidth:120}}>
          <label style={{fontSize:'.78rem',fontWeight:600,color:'var(--text-secondary)'}}>Periodo</label>
          <select value={period} onChange={function(e){setPeriod(parseInt(e.target.value));}} style={{fontFamily:'Inter',fontSize:'.85rem',padding:'6px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)'}}>
            <option value="7">Ultimos 7 dias</option>
            <option value="14">Ultimos 14 dias</option>
            <option value="30">Ultimos 30 dias</option>
            <option value="90">Ultimos 90 dias</option>
          </select>
        </div>
        <div className="field" style={{minWidth:110}}>
          <label style={{fontSize:'.78rem',fontWeight:600,color:'var(--text-secondary)'}}>Turno</label>
          <select value={filterTurno} onChange={function(e){setFilterTurno(e.target.value);}} style={{fontFamily:'Inter',fontSize:'.85rem',padding:'6px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)'}}>
            <option value="">Todos</option>
            <option value="A">Turno A</option>
            <option value="B">Turno B</option>
          </select>
        </div>
        <div className="field" style={{minWidth:160}}>
          <label style={{fontSize:'.78rem',fontWeight:600,color:'var(--text-secondary)'}}>Analista</label>
          <select value={filterAnalista} onChange={function(e){setFilterAnalista(e.target.value);}} style={{fontFamily:'Inter',fontSize:'.85rem',padding:'6px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)'}}>
            <option value="">Todos</option>
            {ANALISTAS.map(function(a){return <option key={a.value} value={a.value}>{a.label}</option>;})}
          </select>
        </div>
        <button className="btn btn-secondary" onClick={loadData} style={{padding:'7px 14px',alignSelf:'flex-end',minHeight:36}}>
          &#8635; Actualizar
        </button>
      </div>

      {loading&&<div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spinner"/></div>}

      {!loading&&(
        <div>
          <div className="dash-tabs">
            <button className={'dash-tab'+(tab==='granu'?' act':'')} onClick={function(){setTab('granu');}}>Granulometria</button>
            <button className={'dash-tab'+(tab==='quim'?' act':'')} onClick={function(){setTab('quim');}}>Quimica</button>
          </div>

          {filtered.length===0&&(
            <div style={{textAlign:'center',padding:32,color:'var(--text-muted)',background:'var(--card)',borderRadius:'var(--radius)',boxShadow:'var(--shadow)'}}>
              Sin registros para los filtros seleccionados
            </div>
          )}

          {filtered.length>0&&tab==='granu'&&(
            <div className="dash-layout">
              <div className="dash-chart-card">
                <div className="dash-chart-title">Controles Granulometricos — {filtered.length} registros</div>
                <div style={{position:'relative',height:320}}>
                  <canvas ref={chartGRef}/>
                </div>
              </div>
              <div className="dash-kpi-card">
                <div style={{fontSize:'.8rem',fontWeight:700,color:'var(--text-secondary)',marginBottom:12,textTransform:'uppercase',letterSpacing:'.04em'}}>KPIs — Ultimo registro</div>
                {kpiStats.map(function(k,i){
                  var semCls=k.sem==='ok'?'sem-ok':k.sem==='warning'?'sem-warn':k.sem==='error'?'sem-err':'sem-info';
                  var semTxt=k.sem==='ok'?'CUMPLE':k.sem==='warning'?'ADVERTENCIA':k.sem==='error'?'DESVIADO':'INFO';
                  return(
                    <div key={i} className="dash-kpi-item">
                      <div className="dash-kpi-name">{k.label}</div>
                      <div className="dash-kpi-row">
                        <span className="dash-kpi-val">{k.last!=null?fmt(k.last,3):'-'}</span>
                        <span className="dash-kpi-lim">
                          {k.limMax!=null?'max '+k.limMax:k.limMin!=null?'min '+k.limMin:''}
                        </span>
                      </div>
                      <div className={'dash-kpi-stat '+semCls}>{semTxt}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {filtered.length>0&&tab==='quim'&&(
            <div>
              <div className="ma-bar">
                <span>Promedio movil:</span>
                <select value={maWin} onChange={function(e){setMaWin(parseInt(e.target.value));}}>
                  <option value="5">5 periodos</option>
                  <option value="7">7 periodos</option>
                </select>
                <span style={{color:'var(--text-muted)',fontWeight:400}}>({filtered.length} registros)</span>
              </div>
              <div className="dash-chart-card">
                <div className="dash-chart-title">Tendencias Quimicas</div>
                <div style={{position:'relative',height:360}}>
                  <canvas ref={chartQRef}/>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── HISTORY SCREEN ── */
function HistoryScreen({account,onBack}){
  var[records,setRecords]=useState([]);
  var[loading,setLoading]=useState(true);
  var[isAdmin,setIsAdmin]=useState(false);
  var[showPass,setShowPass]=useState(false);
  var[toast,setToast]=useState(null);

  useEffect(function(){load();},[]);

  async function load(){
    setLoading(true);
    var pending=getPending().map(function(r){return Object.assign({},r,{status:'pending'});});
    var cloud=[];
    try{
      var token=await getToken();
      if(token){
        var wb=await dlXlsx(token,OD_FILE);
        if(wb){
          var ws=wb.Sheets[wb.SheetNames[0]];
          cloud=XLSX.utils.sheet_to_json(ws).map(function(r){return Object.assign({},r,{status:'sent'});});
        }
      }
    }catch(e){console.error('History',e);}
    var cids=new Set(cloud.map(function(r){return r.ID;}));
    var merged=cloud.concat(pending.filter(function(r){return !cids.has(r.id);}));
    merged.sort(function(a,b){return(b.FechaMuestreo||b.fecha||'').localeCompare(a.FechaMuestreo||a.fecha||'');});
    setRecords(merged);
    setLoading(false);
  }

  async function resend(r){
    try{
      await sendToOD(r,account);
      delPending(r.id);
      setToast({msg:'Registro reenviado exitosamente',type:'success'});
      load();
    }catch(e){setToast({msg:'Error al reenviar: '+e.message,type:'error'});}
  }

  function exportCSV(){
    var hdr=['ID','Fecha','Hora','Turno','Analista','Producto','PesoInicial','PesoFinal','Estado'];
    var rows=records.map(function(r){
      return[r.ID||r.id,r.FechaMuestreo||r.fecha,r.HoraEnvio||r.horaEnvio,r.Turno||r.turno,
        r.Analista||r.analista,r.Producto||r.productoLabel,
        r.PesoInicial||r.pesoInicial,r.PesoFinal||r.pesoFinal,
        r.status==='sent'?'Enviado':'Pendiente'];
    });
    var csv=[hdr].concat(rows).map(function(r){return r.join(',');}).join('\n');
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='historial_arenas.csv';
    a.click();
  }

  return(
    <div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
      {showPass&&<PassModal onOk={function(){setIsAdmin(true);setShowPass(false);}} onCancel={function(){setShowPass(false);}}/>}
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <h2>Historial — Planta Arenas</h2>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <button className="btn btn-secondary" onClick={exportCSV}>Exportar CSV</button>
        {!isAdmin&&<button className="btn btn-secondary" onClick={function(){setShowPass(true);}}>Modo Admin</button>}
        {isAdmin&&<span className="badge badge-s" style={{padding:'4px 12px'}}>Admin activo</span>}
        <button className="btn btn-secondary" onClick={load} style={{marginLeft:'auto'}}>&#8635; Actualizar</button>
      </div>
      {loading
        ?<div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spinner"/></div>
        :<div className="sec-card">
          <div className="sec-card-hdr">Registros ({records.length})</div>
          <div style={{overflowX:'auto'}}>
            <table className="htbl">
              <thead><tr>
                <th>Fecha</th><th>Hora</th><th>Producto</th>
                <th>P. Inicial</th><th>P. Final</th><th>Analista</th><th>Estado</th>
                {isAdmin&&<th>Acciones</th>}
              </tr></thead>
              <tbody>
                {records.length===0&&(
                  <tr><td colSpan={isAdmin?8:7} style={{textAlign:'center',color:'var(--text-muted)',padding:28}}>
                    No hay registros
                  </td></tr>
                )}
                {records.map(function(r,i){
                  return(
                    <tr key={i}>
                      <td>{r.FechaMuestreo||r.fecha}</td>
                      <td>{r.HoraEnvio||r.horaEnvio}</td>
                      <td>{r.Producto||r.productoLabel}</td>
                      <td>{r.PesoInicial||r.pesoInicial}</td>
                      <td>{r.PesoFinal||r.pesoFinal}</td>
                      <td>{r.Analista||r.analista}</td>
                      <td>{r.status==='sent'
                        ?<span className="badge badge-s">Enviado</span>
                        :<span className="badge badge-w">Pendiente</span>}
                      </td>
                      {isAdmin&&<td>
                        {r.status==='pending'&&<>
                          <button className="btn btn-success" style={{padding:'3px 9px',fontSize:'.78rem',marginRight:4}}
                            onClick={function(){resend(r);}}>Reenviar</button>
                          <button className="btn btn-danger" style={{padding:'3px 9px',fontSize:'.78rem'}}
                            onClick={function(){delPending(r.id||r.ID);load();}}>Eliminar</button>
                        </>}
                      </td>}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      }
    </div>
  );
}

/* ── SETTINGS SCREEN ── */
function SettingsScreen({account,onBack,onLogout}){
  var[isAdmin,setIsAdmin]=useState(false);
  var[showPass,setShowPass]=useState(false);
  var[pending,setPending]=useState(getPending());
  var[toast,setToast]=useState(null);
  function refresh(){setPending(getPending());}
  return(
    <div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
      {showPass&&<PassModal onOk={function(){setIsAdmin(true);setShowPass(false);}} onCancel={function(){setShowPass(false);}}/>}
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>&#8592;</button>
        <h2>Ajustes</h2>
      </div>
      <SecCard title="Sesion Microsoft" icon="&#128272;">
        {account
          ?<div>
            <p style={{marginBottom:12}}>Conectado como: <strong>{account.username}</strong></p>
            <button className="btn btn-danger" onClick={onLogout}>Cerrar sesion</button>
          </div>
          :<p>No hay sesion activa.</p>
        }
      </SecCard>
      <SecCard title="Administracion" icon="&#9881;&#65039;">
        {!isAdmin
          ?<button className="btn btn-secondary" onClick={function(){setShowPass(true);}}>Acceder como Admin</button>
          :<div>
            <div style={{marginBottom:14,padding:'8px 12px',background:'var(--success-bg)',borderRadius:'var(--radius-sm)',color:'var(--success)',fontWeight:600}}>Admin activo</div>
            <p style={{marginBottom:12,color:'var(--text-secondary)',fontSize:'.88rem'}}>
              Registros pendientes locales: <strong>{pending.length}</strong>
            </p>
            {pending.length>0&&(
              <div>
                <div style={{overflowX:'auto',marginBottom:12}}>
                  <table className="htbl">
                    <thead><tr><th>ID</th><th>Fecha</th><th>Producto</th><th>Accion</th></tr></thead>
                    <tbody>{pending.map(function(r){
                      return(
                        <tr key={r.id}>
                          <td style={{fontSize:'.72rem',color:'var(--text-muted)'}}>{r.id}</td>
                          <td>{r.fecha}</td>
                          <td>{r.productoLabel}</td>
                          <td>
                            <button className="btn btn-danger" style={{padding:'3px 9px',fontSize:'.78rem'}}
                              onClick={function(){delPending(r.id);refresh();}}>Eliminar</button>
                          </td>
                        </tr>
                      );
                    })}</tbody>
                  </table>
                </div>
                <button className="btn btn-danger" onClick={function(){
                  if(confirm('Eliminar todos los registros pendientes?')){
                    localStorage.removeItem(LS);refresh();
                    setToast({msg:'Registros locales eliminados',type:'success'});
                  }
                }}>Eliminar todos los pendientes</button>
              </div>
            )}
          </div>
        }
      </SecCard>
    </div>
  );
}

/* ── HOME SCREEN ── */
const MODULES=[
  {id:'secado-peral',label:'Secado Peral',active:false},
  {id:'lavado-peral',label:'Lavado Peral',active:false},
  {id:'secado-turco',label:'Secado Turco',active:false},
  {id:'lavado-turco',label:'Lavado Turco',active:false},
  {id:'arenas',label:'Arenas',active:true},
  {id:'cuarzo',label:'Cuarzo',active:false},
];

function HomeScreen({onSelect}){
  return(
    <div>
      <div className="home-intro">
        <h2>Modulos de Control</h2>
        <p>Seleccione un modulo para iniciar el registro de calidad</p>
      </div>
      <div className="modules-grid">
        {MODULES.map(function(m){
          return(
            <div key={m.id} className={'mod-card '+(m.active?'active':'disabled')}

}

/* ── AUTH SCREEN ── */
function AuthScreen({onLogin,loading}){
  return(
    <div className="auth-screen">
      <div className="auth-title">Control de Calidad — MIGRIN S.A.</div>
      <div className="auth-sub">Inicie sesion con su cuenta Microsoft para acceder al sistema.</div>
      {loading
        ?<div className="spinner"/>
        :<button className="btn btn-primary" onClick={onLogin} style={{minWidth:220}}>
          Iniciar sesion con Microsoft
        </button>
      }

  );

/* ── APP ROOT ── */
function App(){
  var[account,setAccount]=useState(IS_LOCAL?LOCAL_ACCOUNT:null);
  var[authLoading,setAuthLoading]=useState(false);
  var[screen,setScreen]=useState('home');
  var[toast,setToast]=useState(null);

  useEffect(function(){
    if(IS_LOCAL)return;
    if(!msalApp){setAuthLoading(false);return;}
    msalApp.handleRedirectPromise()
      .then(function(resp){
        if(resp&&resp.account){msalApp.setActiveAccount(resp.account);setAccount(resp.account);}
        else{
          var accs=msalApp.getAllAccounts();
          if(accs.length)setAccount(accs[0]);
        }
        setAuthLoading(false);
      })
      .catch(function(e){setAuthLoading(false);console.error(e);});
  },[]);

  async function login(){
    if(IS_LOCAL){setAccount(LOCAL_ACCOUNT);return;}
    if(!msalApp)return;
    setAuthLoading(true);
    try{
      if(window.innerWidth<=768){
        await msalApp.loginRedirect({scopes:SCOPES});
      }else{
        var r=await msalApp.loginPopup({scopes:SCOPES});
        setAccount(r.account);setAuthLoading(false);
      }
    }catch(e){setAuthLoading(false);console.error(e);}
  }

  function logout(){
    if(!IS_LOCAL&&msalApp)msalApp.logout();
    setAccount(IS_LOCAL?LOCAL_ACCOUNT:null);setScreen('home');
  }

  function handleSuccess(msg){
    setToast({msg:msg,type:'success'});setScreen('home');
  }

  if(authLoading){
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
        <div className="spinner"/>
      </div>
    );
  }

  var logoUrl='data:image/svg+xml;charset=utf8,%3Csvg xmlns%3D\'http%3A//www.w3.org/2000/svg\' viewBox%3D\'0 0 140 44\'%3E%3Crect width%3D\'140\' height%3D\'44\' fill%3D\'%231a5276\'/%3E%3Ctext x%3D\'12\' y%3D\'30\' font-family%3D\'Arial\' font-size%3D\'20\' font-weight%3D\'800\' fill%3D\'white\'%3EMIGRIN%3C/text%3E%3C/svg%3E';

  var header=(
    <header className="app-header">
      <div className="hdr-brand">
        <img src={logoUrl} alt="MIGRIN" style={{height:42,objectFit:'contain'}}
          onError={function(e){e.target.style.display='none';}}/>
        <div>
          <div className="hdr-title">Control de Calidad</div>
          <div className="hdr-sub">MIGRIN S.A.</div>
        </div>
      </div>
      {account&&(
        <div className="hdr-actions">
          <button className="btn-hdr" onClick={function(){setScreen('home');}}>
            <span className="lbl">Inicio </span>&#127968;
          </button>
          <button className="btn-hdr" onClick={function(){setScreen('dashboard');}}>
            <span className="lbl">Reportes </span>&#128200;
          </button>
          <button className="btn-hdr" onClick={function(){setScreen('history');}}>
            <span className="lbl">Historial </span>&#128202;
          </button>
          <button className="btn-hdr" onClick={function(){setScreen('settings');}}>
            <span className="lbl">Ajustes </span>&#9881;&#65039;
          </button>
        </div>
      )}
    </header>
  );

  if(!account){
    return(
      <>
        {header}
        <div className="main"><AuthScreen onLogin={login} loading={authLoading}/></div>
      </>
    );
  }

  return(
    <>
      {header}
      <div className="main">
        {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
        {screen==='home'&&<HomeScreen onSelect={function(id){if(id==='arenas')setScreen('arenas');}}/>}
        {screen==='arenas'&&<ArenasForm account={account} onBack={function(){setScreen('home');}} onSuccess={handleSuccess}/>}
        {screen==='dashboard'&&<DashboardScreen account={account} onBack={function(){setScreen('home');}}/>}
        {screen==='history'&&<HistoryScreen account={account} onBack={function(){setScreen('home');}}/>}
        {screen==='settings'&&<SettingsScreen account={account} onBack={function(){setScreen('home');}} onLogout={logout}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
